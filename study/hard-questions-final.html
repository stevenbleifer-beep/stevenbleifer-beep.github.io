  // ===== Cyber-kill chain stage classification =====
  { ch: 16, lo: "16.2", section: "Kill Chain Stage", type: "application",
    q: "An attacker captures an employee's credentials via phishing today. Three weeks later, the attacker uses those credentials to log into the corporate VPN. Which stage of the kill chain does the VPN login belong to?",

  { ch: 16, lo: "16.2", section: "Eavesdropping vs On-Path", type: "application",
    q: "An attacker sits on a coffee-shop Wi-Fi and silently captures unencrypted HTTP traffic. They do not modify, impersonate, or inject anything. This is BEST classified as:",

      "Eavesdropping — passive interception only",
      "On-path — they are between two endpoints",

const LOS_BY_CHAPTER = (function() {

  });
  return map;

function formatTime(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  return h > 0 ? h + ":" + pad(m) + ":" + pad(sec) : pad(m) + ":" + pad(sec);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(pool, exceptIndex) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return 0;
  let i = Math.floor(Math.random() * pool.length);
  while (i === exceptIndex) i = Math.floor(Math.random() * pool.length);
  return i;
}

function AISQuiz() {
  const [selectedChapter, setSelectedChapter] = useState("all"); // "all" | 7 | 14 | 19
  const [selectedLO, setSelectedLO] = useState("all"); // "all" | "7.1" | "14.3" | etc.

  const [revealed, setRevealed] = useState(false);
  // Streaks are live counters (persisted separately from the mastered map).
  // correct/total/byChapter are DERIVED from `answered` so they stay in sync
  // with the "Mastered this cycle" graphic.
  const [streakState, setStreakState] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem("bs_hard_streak_v1"));
      if (s && typeof s === "object") {
        return { streak: s.streak || 0, bestStreak: s.bestStreak || 0 };
      }
    } catch(e) {}
    return { streak: 0, bestStreak: 0 };
  });
  const [answered, setAnswered] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bs_hard_answered_v1")) || {}; }
    catch(e) { return {}; }
  });
  const [cycleComplete, setCycleComplete] = useState(false);

  // Per-question timer (resets to 0 each new question) + persisted total time on page.
  const [timerElapsed, setTimerElapsed] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [totalElapsed, setTotalElapsed] = useState(() => {
    try {
      const v = parseInt(localStorage.getItem("bs_hard_total_v1"), 10);
      return isFinite(v) && v >= 0 ? v : 0;
    } catch(e) { return 0; }
  });
  const [totalRunning, setTotalRunning] = useState(() => {
    try {
      const raw = localStorage.getItem("bs_hard_total_running_v1");
      if (raw === null) return true;
      return raw === "true";
    } catch(e) { return true; }
  });

  const stats = useMemo(() => {
    let correct = 0, total = 0;
    const byChapter = {};
    for (const key of Object.keys(answered)) {
      const q = BANK[key];
      if (!q) continue;
      const isCorrect = answered[key] === "correct";
      total++;
      if (isCorrect) correct++;
      const ch = q.ch;
      if (!byChapter[ch]) byChapter[ch] = { correct: 0, total: 0 };
      byChapter[ch].total++;
      if (isCorrect) byChapter[ch].correct++;
    }
    return { correct, total, byChapter, streak: streakState.streak, bestStreak: streakState.bestStreak };
  }, [answered, streakState]);

  const filteredPool = useMemo(() => {
    return BANK.map((q, i) => { const o = { ...q, idx: i }; Object.defineProperty(o,'_x',{value:q._x,enumerable:false,configurable:false,writable:false}); return o; })

      .filter(q => selectedLO === "all" || q.lo === selectedLO)

  useEffect(() => {

      setTimerRunning(false);

      setTimerElapsed(0);
      setTimerRunning(true);

  useEffect(() => {

    const iv = setInterval(() => {
      setTimerElapsed(prev => prev + 1);

    return () => clearInterval(iv);

  // Total (cumulative) timer tick — independent of per-question; paused when cycle is complete

      setCycleComplete(false);

    const unseen = filteredPool.filter(q => answered[q.idx] !== "correct");

      setCurrent(null);
      setCycleComplete(true);
      return;

    setCycleComplete(false);

      shuffledOptions: shuffled.map(s => s.opt),

      shuffledOptions: shuffled.map(s => s.opt),
      correctShuffledIndex,

        e.preventDefault();
        loadNext();
      }

    setTotalRunning(true);
    try { localStorage.removeItem("bs_hard_answered_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_hard_streak_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_hard_total_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_hard_total_running_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_hard_stats_v1"); } catch(e) {} // legacy cleanup
    try { localStorage.removeItem("bs_hard_timer_v1"); } catch(e) {} // legacy cleanup

    setStreakState({ streak: 0, bestStreak: 0 });

              (selectedChapter === "all" || q.ch === selectedChapter) &&
              (selectedLO === "all" || q.lo === selectedLO) &&
              (key === "all" || q.type === key)
            ).length;
            return (
              <button
                key={key}
                onClick={() => setTypeFilter(key)}
                className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                style={{
                  background: active ? "#1c1917" : "transparent",
                  color: active ? "#fff" : "#78716c",
                  borderColor: active ? "#1c1917" : "#d6d3d1",
                }}
              >
                {label} <span className="font-mono opacity-70 ml-1">({count})</span>
              </button>
            );
          })}
          <span className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 hidden sm:inline">
            Keys: 1–4 · Enter
          </span>
        </div>

        {/* Progress & status row */}
        <div className="flex flex-wrap items-center gap-3 mb-6">
          <div className="flex-1 min-w-[180px]">
            <div className="flex items-center justify-between font-mono text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1.5">
              <span>Mastered this cycle</span>
              <span className="flex items-center gap-3">
                <span className="flex items-center gap-1.5">
                  <span className="tabular-nums text-stone-700" style={{ fontSize: 11 }}>{formatTime(timerElapsed)}</span>
                  <button
                    type="button"
                    onClick={() => { if (!cycleComplete) setTimerRunning(r => !r); }}
                    aria-label={timerRunning ? "Pause timer" : "Start timer"}
                    title={timerRunning ? "Pause timer" : "Start timer"}
                    disabled={cycleComplete}
                    style={{
                      width: 18, height: 18, padding: 0, border: "1px solid #d6d3d1",
                      borderRadius: 999, background: "#fff",
                      cursor: cycleComplete ? "default" : "pointer",
                      opacity: cycleComplete ? 0.5 : 1,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      color: "#1c1917",
                    }}
                  >
                    {timerRunning ? (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="2" height="6" /><rect x="5" y="1" width="2" height="6" /></svg>
                    ) : (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><path d="M1 1 L7 4 L1 7 Z" /></svg>
                    )}
                  </button>
                </span>
                <span>
                  {filteredPool.filter(q => answered[q.idx] === "correct").length} / {filteredPool.length}
                </span>
              </span>
            </div>
            <div className="flex gap-[2px] flex-wrap">
              {filteredPool.map(q => {
                const s = answered[q.idx];
                const isCurrent = current && current.q && current.q.idx === q.idx;
                const bg = s === "correct" ? "#16a34a" : s === "wrong" ? "#dc2626" : "#e7e5e4";
                const label = s === "correct" ? "Correct" : s === "wrong" ? "Wrong" : "Unseen";
                return (
                  <button
                    key={q.idx}
                    type="button"
                    onClick={() => jumpToQuestion(q)}
                    title={label + " — click to revisit"}
                    aria-label={"Jump to question: " + label}
                    style={{
                      width: 10, height: 10, borderRadius: 2, background: bg,
                      padding: 0, border: 0, cursor: "pointer",
                      outline: isCurrent ? "2px solid #1c1917" : "none",
                      outlineOffset: isCurrent ? 1 : 0,
                    }}
                  />
                );
              })}
            </div>
          </div>
        </div>

        {cycleComplete && (
          <div className="fade-in mb-6 rounded-2xl p-5 border" style={{ background: "#fff", borderColor: "#d6d3d1" }}>
            <div className="font-serif-display text-xl font-bold text-stone-900 mb-1">All mastered</div>
            <div className="text-sm text-stone-600 mb-3">
              You've answered all {filteredPool.length} questions in this filter correctly. Start a new cycle to go through them again.
            </div>
            <button
              onClick={startNewCycle}
              className="option-btn px-4 py-2 text-sm font-medium rounded-full text-white"
              style={{ background: "#1c1917" }}
            >
              Start new cycle
            </button>
          </div>
        )}


        {/* Question card */}
        {current ? (
          <div key={stats.total} className="fade-in">
            {/* Source metadata */}
            <div className="flex items-center gap-3 mb-4 flex-wrap">
              <span
                className="font-mono text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded"
                style={{
                  background: CHAPTER_META[current.q.ch].accent,
                  color: "#fff",
                }}
              >
                {(typeof current.q.ch === "number" ? "Ch " + current.q.ch : current.q.ch) + " · " + (typeof current.q.ch === "number" ? "LO " + current.q.lo : current.q.lo)}
              </span>
              <span className="font-mono text-xs text-stone-500">
                § {current.q.section}
              </span>
              <span
                className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] px-2 py-0.5 rounded border"
                style={{
                  borderColor: current.q.type === "application" ? "#d97706" : "#a8a29e",
                  color: current.q.type === "application" ? "#b45309" : "#78716c",
                  background: current.q.type === "application" ? "#fef3c7" : "transparent",
                }}
              >
                {current.q.type}
              </span>
            </div>

            {/* Question */}
            <div className="relative mb-7">
              <div className="absolute -left-3 top-0 bottom-0 w-0.5" style={{ background: CHAPTER_META[current.q.ch].accent, opacity: 0.3 }}/>
              <h2 className="font-serif-display text-2xl sm:text-[28px] leading-[1.25] text-stone-900 font-semibold pl-3">
                {current.q.q}
              </h2>
            </div>

            {/* Options */}
            <div className="space-y-2.5 mb-6">
              {current.shuffledOptions.map((opt, i) => {
                const isCorrect = i === current.correctShuffledIndex;
                const isSelected = i === selected;
                let bg = "#fff";
                let border = "#e7e5e4";
                let textColor = "#1c1917";
                let letterBg = "#f5f5f4";
                let letterColor = "#78716c";

                if (revealed) {
                  if (isCorrect) {
                    bg = "#f0fdf4";
                    border = "#16a34a";
                    letterBg = "#16a34a";
                    letterColor = "#fff";
                  } else if (isSelected) {
                    bg = "#fef2f2";
                    border = "#dc2626";
                    letterBg = "#dc2626";
                    letterColor = "#fff";
                  } else {
                    textColor = "#a8a29e";
                  }
                } else if (isSelected) {
                  border = "#1c1917";
                }

                return (
                  <button
                    key={i}
                    onClick={() => handleSelect(i)}
                    disabled={revealed}
                    className="option-btn w-full text-left px-4 py-3.5 rounded-lg border flex items-start gap-4 disabled:cursor-default"
                    style={{ background: bg, borderColor: border, color: textColor }}
                  >
                    <span
                      className="font-mono text-xs font-bold w-6 h-6 flex items-center justify-center rounded shrink-0 mt-0.5"
                      style={{ background: letterBg, color: letterColor }}
                    >
                      {String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-[15px] leading-snug flex-1">{opt}</span>
                    {revealed && isCorrect && (
                      <span className="text-green-600 font-bold text-lg">✓</span>
                    )}
                    {revealed && isSelected && !isCorrect && (
                      <span className="text-red-600 font-bold text-lg">✕</span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Explanation + next */}
            {revealed && (
              <div className="fade-in">
                <div className="border-t-2 border-dashed border-stone-300 pt-5 mb-5">
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
                    {selected === current.correctShuffledIndex ? "Correct" : "Answer"}
                  </div>
                  <p className="font-serif-display text-[17px] leading-relaxed text-stone-800 italic">
                    {current.q.explain}
                  </p>
                </div>
                <button
                  onClick={loadNext}
                  className="option-btn w-full sm:w-auto px-8 py-3 rounded-lg font-medium text-sm text-white"
                  style={{ background: "#1c1917" }}
                >
                  Next question →
                </button>
              </div>
            )}
          </div>
        ) : (
          <div className="text-center py-20 text-stone-500 font-serif-display italic">
            No questions in the selected scope.
          </div>
        )}

        {/* Footer */}
        <footer className="mt-16 pt-6 border-t border-stone-200 font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 flex flex-wrap justify-between gap-2">
          <span>{BANK.length} questions · {filteredPool.length} in scope</span>
          <span>Continuous review mode</span>
        </footer>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AISQuiz />);
  </script>
</body>
</html>
