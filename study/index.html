<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="same-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Bleifer Study</title>
  <meta name="description" content="Study guides and review quizzes" />
  <meta name="theme-color" content="#fbf9f4" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fbf9f4;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 80px 24px 48px;
    }
    .logo {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1c1917;
      margin-bottom: 4px;
    }
    .tagline {
      font-family: Georgia, serif;
      font-style: italic;
      color: #a8a29e;
      font-size: 0.95rem;
      margin-bottom: 48px;
    }
    .section-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #a8a29e;
      margin-bottom: 16px;
    }
    .card {
      display: block;
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 12px;
    }
    .card:hover {
      border-color: #1c1917;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.85rem;
      color: #78716c;
      line-height: 1.5;
    }
    .card-meta {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .pill {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: #f5f5f4;
      color: #78716c;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #a8a29e;
      font-family: Georgia, serif;
      font-style: italic;
    }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid #e7e5e4;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a8a29e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Bleifer Study</div>
    <div class="tagline">Review quizzes and study guides</div>

    <div class="section-label">Study Guides</div>

    <a class="card" href="ais.html">
      <div class="card-title">AIS Review</div>
      <div class="card-desc">Accounting Information Systems · Chapters 7, 14, 19. Review quiz, key-terms flashcards, and hard exam-style questions.</div>
      <div class="card-meta">
        <span class="pill">Quiz</span>
        <span class="pill">Flashcards</span>
        <span class="pill">Hard Qs</span>
        <span class="pill">NYU Stern</span>
      </div>
    </a>

    <p class="empty-state">More study guides coming soon.</p>

    <footer>
      &copy; 2026 Steven Bleifer
    </footer>
  </div>
</body>
</html>
