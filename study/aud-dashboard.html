    var UNIT_COLORS = {
      A1: "#c2410c", A2: "#b45309", A3: "#0e7490", A4: "#7c3aed", A5: "#15803d",

    };

    var STORAGE_KEY = "aud_progress";

    // ---- State + persistence (localStorage) ----
    var progress = {};
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") progress = parsed;
      }
    } catch (e) { /* corrupt or unavailable storage — start fresh */ }

    var openDay = "d0616";

    function persist() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
      catch (e) { /* storage full or blocked — state still holds for the session */ }
    }

    // Today's local date as ISO (YYYY-MM-DD), so the "today" highlight stays correct.
    function todayISO() {
      var d = new Date();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return d.getFullYear() + "-" + m + "-" + day;
    }
    var today = todayISO();

    // ---- Safe DOM helper: never uses innerHTML, so no injection surface ----
    function h(tag, props) {
      var el = document.createElement(tag);
      if (props) {
        for (var k in props) {
          if (!Object.prototype.hasOwnProperty.call(props, k)) continue;
          var v = props[k];
          if (v == null) continue;
          if (k === "style") { el.setAttribute("style", v); }
          else if (k === "text") { el.textContent = v; }
          else if (k === "class") { el.className = v; }
          else if (k.slice(0, 2) === "on" && typeof v === "function") {
            el.addEventListener(k.slice(2).toLowerCase(), v);
          } else if (k in el && k !== "role") {
            try { el[k] = v; } catch (e) { el.setAttribute(k, v); }
          } else {
            el.setAttribute(k, v);
          }
        }
      }
      for (var i = 2; i < arguments.length; i++) {
        var child = arguments[i];
        if (child == null || child === false) continue;
        if (Array.isArray(child)) {
          child.forEach(function (c) { if (c != null && c !== false) el.appendChild(typeof c === "object" ? c : document.createTextNode(String(c))); });
        } else if (typeof child === "object") {
          el.appendChild(child);
        } else {
          el.appendChild(document.createTextNode(String(child)));
        }
      }
      return el;
    }

    function num(v) { var n = Number(v); return isFinite(n) && n > 0 ? n : 0; }

    function totals() {
      var t = { tbsDone: 0, tbsTarget: 0, mcqDone: 0, mcqTarget: 0 };
      PLAN.forEach(function (d) {
        t.tbsTarget += d.tbsTarget;
        t.mcqTarget += d.mcqTarget;
        t.tbsDone += num(progress[d.id + "_tbs"]);
        t.mcqDone += num(progress[d.id + "_mcq"]);
      });
      return t;
    }

    function dayComplete(d) {
      if (d.off || d.exam) return false;
      if (!d.tasks.length) return false;
      return d.tasks.every(function (_, i) { return !!progress[d.id + "_t" + i]; });
    }

    function toggleTask(dayId, idx) {
      var key = dayId + "_t" + idx;
      progress[key] = !progress[key];
      persist();
      render();
    }

    function setCount(dayId, kind, val) {
      // Clamp to a non-negative integer; ignore junk.
      var n = parseInt(val, 10);
      if (!isFinite(n) || n < 0) n = 0;
      progress[dayId + "_" + kind] = val === "" ? "" : n;
      persist();
      // No re-render here so the input keeps focus while typing; totals update on blur via render.
    }

    // ---- Components ----
    function StatBar(label, done, target, color) {
      var pct = target ? Math.min(100, Math.round((done / target) * 100)) : 0;
      return h("div", { style: "background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;" },

            h("span", { style: "color:#cbd5e1;font-weight:500;", text: "/" + target })
          )
        ),
        h("div", { style: "height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden;" },
          h("div", { style: "width:" + pct + "%;height:100%;background:" + color + ";border-radius:999px;transition:width 0.3s ease;" })
        )
      );
    }

    function Counter(label, dayId, kind) {
      var stored = progress[dayId + "_" + kind];
      var input = h("input", {
        type: "number", min: "0", step: "1", inputmode: "numeric",
        class: "num-input", placeholder: "0",
        value: (stored == null ? "" : String(stored)),
      });
      input.addEventListener("input", function () { setCount(dayId, kind, input.value); });
      input.addEventListener("blur", render);
      return h("div", { style: "display:flex;flex-direction:column;gap:4px;" },
        h("span", { style: "font-size:11px;color:#64748b;font-weight:600;", text: label }),
        input
      );
    }

    function dayCard(d) {
      var isOpen = openDay === d.id;
      var isToday = d.iso === today;
      var complete = dayComplete(d);
      var accent = d.off ? "#94a3b8" : d.optional ? "#94a3b8" : d.exam ? "#dc2626" : (UNIT_COLORS[d.unit] || "#1e3a5f");

      var headChildren = [];
      // Date block
      headChildren.push(h("div", { style: "flex-shrink:0;width:92px;" },

      ));
      // Badge block
      var badge = h("div", { style: "flex-shrink:0;" });

      }
      headChildren.push(badge);
      // Title block
      headChildren.push(h("div", { style: "flex:1;min-width:0;" },

      ));
      // Targets block

        if (d.hours) {
          targetBlock.appendChild(h("div", { style: "font-size:11px;color:#94a3b8;font-weight:600;margin-top:2px;", text: "⏱ " + d.hours }));
        }
        headChildren.push(targetBlock);

      }

      var head = h("button", {
        class: "card-head", type: "button",
        "aria-expanded": isOpen ? "true" : "false",
        onClick: function () { openDay = isOpen ? null : d.id; render(); },

      var card = h("div", {

          ";overflow:hidden;opacity:" + (d.off ? "0.85" : "1") + ";",
      }, head);

      // Body — study days
      if (isOpen && !d.off && !d.exam) {
        var body = h("div", { style: "padding:0 16px 16px 16px;" });
        body.appendChild(h("p", { style: "font-size:13px;color:#475569;margin:0 0 14px;line-height:1.5;border-left:2px solid #e2e8f0;padding-left:10px;", text: d.focus }));

        if (d.hours) {
          var bandTop = h("div", { style: "display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;font-weight:700;margin-bottom:4px;" },
            h("span", { style: "color:#334155;", text: "⏱ " + d.hours }));
          if (d.tbsTarget > 0) bandTop.appendChild(h("span", { style: "color:#7c3aed;", text: d.tbsTarget + " TBS" + (d.tbsDeep ? " (" + d.tbsDeep + " deep)" : "") }));
          if (d.mcqTarget > 0) bandTop.appendChild(h("span", { style: "color:#0e7490;", text: d.mcqTarget + " MCQ" + (d.mcqGoal ? " → " + d.mcqGoal + "%" : "") }));
          body.appendChild(h("div", { style: "background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:14px;" },
            bandTop,
            h("div", { style: "font-size:12px;color:#64748b;line-height:1.45;", text: d.breakdown })
          ));
        }

        if (d.tbsTarget > 0 || d.mcqTarget > 0) {
          var counters = h("div", { style: "display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap;" });
          if (d.tbsTarget > 0) counters.appendChild(Counter("TBS (target " + d.tbsTarget + (d.tbsDeep ? ", " + d.tbsDeep + " deep" : "") + ")", d.id, "tbs"));
          if (d.mcqTarget > 0) counters.appendChild(Counter("MCQ (target " + d.mcqTarget + (d.mcqGoal ? ", aim " + d.mcqGoal + "%" : "") + ")", d.id, "mcq"));
          body.appendChild(counters);
        }

        var tasks = h("div", { style: "display:flex;flex-direction:column;gap:8px;" });
        d.tasks.forEach(function (t, i) {
          var checked = !!progress[d.id + "_t" + i];
          var box = h("span", {
            class: "checkbox",
            style: "flex-shrink:0;width:18px;height:18px;border-radius:5px;border:2px solid " + (checked ? accent : "#cbd5e1") +
              ";background:" + (checked ? accent : "#fff") + ";color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px;",
            text: checked ? "✓" : "",
          });
          var label = h("span", {
            style: "font-size:14px;line-height:1.45;color:" + (checked ? "#94a3b8" : "#334155") + ";text-decoration:" + (checked ? "line-through" : "none") + ";",
            text: t,
          });
          var row = h("div", {
            class: "task-row", role: "checkbox", "aria-checked": checked ? "true" : "false", tabindex: "0",
            style: "display:flex;align-items:flex-start;gap:10px;",
            onClick: function () { toggleTask(d.id, i); },
            onKeydown: function (e) { if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleTask(d.id, i); } },
          }, box, label);
          tasks.appendChild(row);
        });
        body.appendChild(tasks);
        card.appendChild(body);
      }

      // Body — off / exam
      if (isOpen && (d.off || d.exam)) {
        card.appendChild(h("div", { style: "padding:0 16px 16px 16px;" },
          h("p", { style: "font-size:13px;color:#475569;margin:0;line-height:1.5;",
            text: d.exam
              ? "Eat, show up, flag-and-move on hard MCQ, protect your TBS time. You did the work."
              : "No studying today. Rest is part of the plan — the schedule already accounts for it." })
        ));
      }

      return card;
    }

    function render() {
      var app = document.getElementById("app");
      app.textContent = "";

      app.appendChild(h("a", { class: "back-link", href: "./" }, "← Study"));

      // Header
      app.appendChild(h("div", { style: "margin-bottom:8px;" },
        h("div", { style: "font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#7c3aed;font-weight:700;", text: "AUD · Sprint to the 29th" }),
        h("h1", { style: "font-size:30px;font-weight:800;margin:4px 0 2px;letter-spacing:-0.02em;", text: "The road to the 29th" }),
        h("p", { style: "color:#64748b;font-size:15px;margin:0;", text: "Weighted toward TBS in A4 and A3, where your points actually are." })
      ));

      // Progress bars
      var t = totals();
      app.appendChild(h("div", { style: "display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0 24px;" },
        StatBar("TBS reps", t.tbsDone, t.tbsTarget, "#7c3aed"),
        StatBar("MCQ logged", t.mcqDone, t.mcqTarget, "#0e7490")
      ));

      // Day cards
      var list = h("div", { style: "display:flex;flex-direction:column;gap:10px;" });
      PLAN.forEach(function (d) { list.appendChild(dayCard(d)); });
      app.appendChild(list);

      // Footer note
      app.appendChild(h("div", { style: "margin-top:24px;padding:14px 16px;background:#fef9c3;border:1px solid #fde047;border-radius:10px;font-size:13px;color:#713f12;line-height:1.5;" },
        h("b", { text: "Two reminders:" }),
        " Update your exam date in Becker to the 29th, or the dashboard pacing and Final Review will fight this plan. And don't skim TBS to hit the count — a re-worked TBS beats five skimmed. If the Jun 24 Mini Exam shows a unit cratering, the days after it are your room to patch before the Jun 26 sim."
      ));
      app.appendChild(h("div", { style: "margin-top:16px;font-size:12px;color:#94a3b8;text-align:center;", text: "Progress saves automatically to this device. Tap a day to expand." }));
    }

    render();
  })();
  </script>
</body>
</html>
