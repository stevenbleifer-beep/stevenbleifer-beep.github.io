  { ch: 7, lo: "7.HARD", section: "Risk Oversight Teams", type: "application",

  { ch: 7, lo: "7.HARD", section: "Extended Reality", type: "memorization",

  { ch: 7, lo: "7.HARD", section: "Cobots", type: "memorization",

  { ch: 7, lo: "7.HARD", section: "RPA vs AI", type: "application",

  { ch: 7, lo: "7.HARD", section: "RPA Feasibility", type: "application",

  { ch: 7, lo: "7.HARD", section: "Cryptology", type: "memorization",

  { ch: 14, lo: "14.HARD", section: "COSO vs COBIT", type: "application",

  { ch: 14, lo: "14.HARD", section: "COBIT Domains", type: "memorization",

  { ch: 14, lo: "14.HARD", section: "RBAC", type: "memorization",

  { ch: 14, lo: "14.HARD", section: "Authentication vs Authorization", type: "application",

  { ch: 14, lo: "14.HARD", section: "De-provisioning", type: "application",

  { ch: 14, lo: "14.HARD", section: "Termination vs Transfer", type: "memorization",

  { ch: 14, lo: "14.HARD", section: "Dormant Access", type: "memorization",
    q: "Which most precisely defines 'dormant access' per the chapter?",

    explain: "The slides define an audit canvas as an Agile version of the audit planning memo, capturing planning information stakeholders need to know." },
  { ch: 19, lo: "19.HARD", section: "Design vs Operating Effectiveness", type: "application",
    q: "An auditor independently re-creates a control using data analytics to test whether it actually works in practice. Which test is this, and to which effectiveness does it uniquely apply?",
    options: ["Inquiry - applies to both design and operating effectiveness", "Observation - applies uniquely to operating effectiveness", "Reperformance - applies uniquely to operating effectiveness (not design effectiveness)", "Inspection - applies uniquely to design effectiveness"],
    explain: "The chapter states 'Unlike design effectiveness, operating effectiveness is tested through reperformance.' Inquiry, observation, and inspection apply to both; reperformance is unique to operating effectiveness." },
  { ch: 19, lo: "19.HARD", section: "Controls vs Substantive", type: "application",
    q: "An internal auditor uses data analytics over the full vendor master population and discovers several duplicate vendors. This work is BEST characterized as what, and what does it suggest?",
    options: ["A test of controls suggesting control design is ineffective", "A substantive procedure; errors found may indicate a control deficiency", "A process walkthrough suggesting operating ineffectiveness", "A scoping activity performed during planning"],
    explain: "Substantive procedures look for material misstatements in underlying data; the chapter notes 'any errors identified may indicate the presence of a control deficiency.' Tests of controls test the control itself, not the underlying data." },
  { ch: 19, lo: "19.HARD", section: "Process Walkthrough", type: "memorization",
    q: "According to the chapter, a process walkthrough is:",
    options: ["A reperformance test where auditors re-execute a control themselves", "An interview where auditees explain their daily job functions to the auditor", "A written questionnaire delivered to all department members", "A data-analytics scan of system logs to map actual process flow"],
    explain: "A walkthrough is specifically an interview in which an auditee explains their daily job functions. It is not reperformance, not a questionnaire, and not a log scan." },
  { ch: 19, lo: "19.HARD", section: "Wrap-up", type: "application",
    q: "During which audit stage do auditors ensure that workpapers are complete, organized, and properly reviewed by audit managers, AND draft the audit report?",
    options: ["Fieldwork", "Wrap-up", "Reporting", "Follow-up"],
    explain: "Wrap-up is explicitly when workpapers are finalized and the draft audit report is prepared. Reporting is when the final report is distributed; Fieldwork is when testing occurs." },
  { ch: 19, lo: "19.HARD", section: "Management Response", type: "memorization",
    q: "At the exit meeting, management provides the audit team with what specific deliverable?",
    options: ["Audit recommendations with root cause analysis", "Management's response - a plan for remediation including a timeline", "The final audit report for distribution to shareholders", "A scoping document for the next audit"],
    explain: "Management provides management's response (a remediation plan with timeline) at the exit meeting. Audit recommendations come from the auditors, not management." },
  { ch: 19, lo: "19.HARD", section: "Follow-up", type: "application",
    q: "An audit is completed and the final report issued with NO findings. According to the chapter, what happens next?",
    options: ["The audit team still performs follow-up to verify ongoing compliance", "The engagement ends at the reporting stage; no follow-up is required", "The auditee must still submit a remediation plan within 30 days", "The external auditor takes over to verify the findings"],
    explain: "The chapter explicitly states: 'If an audit has no findings, the engagement ends at the reporting stage.' Follow-up only occurs when there are findings requiring remediation verification." },
  { ch: 14, lo: "14.HARD", section: "COBIT Domains", type: "application",
    q: "A company is rolling out a new cloud ERP system. Project managers are defining IT staffing structures, budgets, and vendor relationships needed to support implementation. Which COBIT domain BEST describes this activity?",
    options: [
      "APO (Align, Plan, and Organize), because it covers planning the IT function and organizing resources to support business strategy before a build begins",
      "BAI (Build, Acquire, and Implement), because the company is in the process of acquiring and deploying new technology for operational use",
      "DSS (Deliver, Service, and Support), because the planning work is part of ensuring service delivery will function correctly after go-live",
      "EDM (Evaluate, Direct, and Monitor), because the board must evaluate whether the ERP investment aligns with overall corporate strategy"],
    explain: "APO covers aligning IT with business direction, planning the IT function, and organizing resources — staffing, budgets, and vendor relationships are APO activities that happen before building or acquiring a system begins." },
  { ch: 14, lo: "14.HARD", section: "COBIT Domains", type: "application",
    q: "Six months after a major system upgrade, the IT department runs a formal review comparing actual system performance against the targets set during the planning phase. Which COBIT domain does this activity fall under?",
    options: [
      "MEA (Monitor, Evaluate, and Assess), because it involves measuring whether IT performance is meeting organizational objectives after implementation",
      "DSS (Deliver, Service, and Support), because post-implementation reviews are part of ongoing service delivery and operational support activities",
      "APO (Align, Plan, and Organize), because the review references the original planning-phase targets, making it an extension of the planning process",
      "EDM (Evaluate, Direct, and Monitor), because the board of directors must evaluate all strategic IT investments before management can act on findings"],
    explain: "MEA is specifically about monitoring and evaluating ongoing IT processes against objectives — a post-implementation performance review measuring actuals against targets is a textbook MEA activity." },
  { ch: 14, lo: "14.HARD", section: "Segregation of Duties", type: "application",
    q: "An internal auditor at a 400-person company finds that the same employee in AP creates new vendors AND approves payments. The auditor then reviews a 6-person startup and finds the same overlap. How should the auditor's response DIFFER between the two companies?",
    options: [
      "At the large company, the overlap is a reportable SoD control deficiency requiring remediation; at the startup, it is still a risk but compensating controls such as owner oversight are likely the realistic mitigation",
      "At the large company, the finding should be escalated to the SEC; at the startup, no action is required because small businesses are exempt from internal control standards",
      "At both companies, the response is identical — SoD deficiencies must be remediated by hiring additional staff regardless of company size or operational constraints",
      "At the startup, the finding is more serious because smaller companies are targeted more frequently by fraudsters, requiring stricter controls than larger enterprises"],
    explain: "At a 400-person company, there is no staffing excuse for combining vendor creation and payment approval — it must be remediated. At a 6-person startup, full SoD may be impractical; the auditor should flag it and identify compensating controls as a realistic alternative." },
  { ch: 14, lo: "14.HARD", section: "Blockchain Audit", type: "application",
    q: "An auditor is engaged to evaluate a client that records revenue transactions on a private blockchain. The auditor's supervisor says: 'Blockchain is immutable, so we don't need to test completeness and accuracy.' Which is the BEST response?",
    options: [
      "Disagree — immutability only means records cannot be changed after entry; it does not prevent incomplete or inaccurate data from being written to the chain in the first place, so completeness and accuracy controls must still be tested",
      "Agree — because blockchain's consensus mechanism validates every transaction before it is added, any data on the chain has already passed accuracy and completeness verification by the network",
      "Agree — the PCAOB has issued guidance stating that auditors may rely on blockchain immutability as a substitute for substantive testing of financial transactions",
      "Disagree — blockchain should be tested using different criteria than traditional systems because its decentralized architecture makes standard audit procedures inapplicable"],
    explain: "Immutability prevents tampering with records after they are entered, but it does nothing to prevent bad data from being entered initially. The auditor must still test whether transactions are complete (all entered) and accurate (entered correctly) — the same as any other system." },
  { ch: 7, lo: "7.HARD", section: "Adoption Curve", type: "application",
    q: "A privately held manufacturer has deployed a technology used by roughly half of its industry peers. Under the Rogers framework, which category BEST describes this company, and why?",
    options: [
      "Innovators, because any deployment places the company among the first 2.5% of adopters regardless of industry penetration rates",
      "Early Majority, because adoption around the halfway mark of peers matches the 34% category sitting just above average adoption",
      "Late Majority, because only the final holdouts remain — adoption well past the halfway mark signals a laggard-adjacent profile",
      "Early Adopter, because adoption by around half of peers indicates the company is substantially ahead of the mainstream market"],
    explain: "Innovators (2.5%) + Early Adopters (13.5%) = 16%, so the first ~16% are ahead of the Early Majority. By the time roughly 50% of peers have adopted, you're in the Early Majority (34%), which sits just past the mainstream tipping point." },
  { ch: 7, lo: "7.HARD", section: "Internal Audit Duty", type: "memorization",
    q: "Which of the following is NOT listed in the chapter as an internal audit responsibility when auditing emerging technologies?",
    options: [
      "Understanding which emerging/disruptive technologies are being used",
      "Assessing how technologies will impact current controls",
      "Approving management's technology implementation decisions",
      "Identifying control gaps and recommending new controls"],
    explain: "Internal audit provides recommendations but does NOT approve implementations — that is a management responsibility." },
  { ch: 7, lo: "7.HARD", section: "ERM vs COE", type: "application",
    q: "A new blockchain initiative needs a team whose primary focus is evaluating fit with current operations AND another team positioned for risk assessment working with IT. Which pair BEST matches these mandates?",
    options: ["Internal Audit / External Audit", "ERM (fit) / Emerging Technology COE (risk)", "Emerging Technology COE (fit) / ERM (risk strategy with IT)", "IT Department / Finance"],
    explain: "COE evaluates fit with current operations; ERM focuses on risk and works with IT to strategize and approve." },
  { ch: 7, lo: "7.HARD", section: "5Vs of Big Data", type: "application",
    q: "A streaming platform reports that 80% of its recommendation data consists of unverified user-generated comments. Which of the 5Vs of big data does this MOST directly implicate?",
    options: ["Volume", "Velocity", "Veracity", "Value"],
    explain: "Veracity addresses trustworthiness/accuracy of data — unverified content directly affects veracity." },
  { ch: 7, lo: "7.HARD", section: "IoT Business vs Consumer", type: "application",
    q: "A car-rental fleet installs sensors that monitor engine performance on every vehicle and report telematics data back to operations for predictive maintenance. Per the chapter's taxonomy, this is BEST classified as:",
    options: [
      "Consumer-facing IoT wearables leveraged via big data, because telematics personally affect the driver's experience",
      "Business operations IoT — because sensors feed operational decision-making like maintenance scheduling",
      "Autonomous Things, because vehicles with sensors are driven by algorithms",
      "Extended Reality, because the data creates a virtual representation of each vehicle"],
    explain: "Business operations IoT includes sensor/telematics for internal operations; consumer IoT is products customers interact with." },
  { ch: 7, lo: "7.HARD", section: "XR Spectrum", type: "application",
    q: "A surgeon uses goggles that anchor a 3-D organ model to her patient, allowing the model to respond to her physical hand gestures. Along the XR spectrum, this is BEST characterized as:",
    options: [
      "Pure Augmented Reality (AR), because the overlay does not interact with the physical world",
      "Mixed Reality (MR), because digital objects anchor to and interact with the physical environment",
      "Virtual Reality (VR), because goggles immerse the user in a simulated world",
      "Gamification, because surgical practice resembles a video game"],
    explain: "MR sits between AR and VR — it overlays digital objects that INTERACT with the physical world." },
  { ch: 7, lo: "7.HARD", section: "Gamification Limit", type: "application",
    q: "A company adopts a points/badges system for customer purchases but the customers view it as childish and abandon the program. Under the chapter's definition, this illustrates that gamification:",
    options: [
      "Must be designed with clear work/skill-learning relevance and appropriate audience to produce engagement",
      "Cannot be used in consumer-facing settings",
      "Is always successful regardless of audience",
      "Is identical to marketing mascots"],
    explain: "Gamification merges game principles with real-world simulations to teach/motivate — without meaningful context or fit, it can fail." },
  { ch: 7, lo: "7.HARD", section: "RPA vs AI Trade-off", type: "application",
    q: "A bank wants software to flag fraudulent transactions by evolving its recognition of new fraud patterns without re-coding. Which choice is correct and WHY?",
    options: [
      "RPA, because drag-and-drop is faster to implement and can self-adjust rules in production",
      "AI, because AI evolves through self-learning while RPA's pre-programmed tasks cannot change without reprogramming",
      "RPA, because RPA can identify unknown patterns through statistical inference without any rules",
      "AI, because AI requires no governance and bypasses internal controls"],
    explain: "Per Table 7.6, AI evolves through self-learning; RPA rules never change unless reprogrammed." },
  { ch: 7, lo: "7.HARD", section: "Conditional Logic ELSE IF", type: "application",
    q: "An AP RPA contains: IF invoice received AND amount < $5,000 THEN auto-approve; ELSE IF amount < $25,000 THEN route to manager; ELSE route to CFO. Which statement is TRUE?",
    options: [
      "The ELSE IF is a catch-all executed when neither IF nor the ELSE triggers",
      "The ELSE IF specifies an additional scenario that runs when the primary IF is false AND its own condition is true",
      "Only the IF branch can reference the amount field; ELSE IF must reference a different field",
      "ELSE IF executes alongside IF to double-check"],
    explain: "ELSE IF captures an additional scenario — runs when prior IFs are false and its own condition is true." },
  { ch: 7, lo: "7.HARD", section: "RPA Feasibility Edge", type: "application",
    q: "Which process is LEAST suitable for RPA under the chapter's criteria?",
    options: [
      "Automated bank reconciliation from a digital bank feed",
      "Drafting qualitative narrative disclosures that require professional judgment about materiality",
      "Extracting standardized vendor invoice data from structured PDFs",
      "Daily aggregation of digital sales dashboards"],
    explain: "Judgment-based narrative drafting violates the routine/rules-based requirement." },
  { ch: 7, lo: "7.HARD", section: "Blockchain Nodes vs Miners", type: "memorization",
    q: "Which statement correctly distinguishes 'nodes' from 'miners' in the blockchain architecture?",
    options: [
      "Nodes are the computers of network participants; miners are participants who use their nodes' computing power to solve the mathematical puzzles that secure transactions",
      "Nodes are cryptocurrency tokens earned through mining; miners are the servers that store the blockchain",
      "Nodes and miners are synonyms — both refer to the servers that solve puzzles",
      "Nodes physically mine cryptocurrency; miners are passive storage computers"],
    explain: "Nodes = hardware; miners = participants who run the puzzle-solving to secure transactions." },
  { ch: 7, lo: "7.HARD", section: "Decentralized vs Distributed", type: "application",
    q: "A consortium of six regional hospitals maintains hubs that each hold copies of the same patient-encounter ledger. Within the chapter's taxonomy, this architecture is BEST labeled:",
    options: [
      "Centralized — one organization ultimately owns the shared ledger",
      "Distributed — every participant holds an identical electronic copy",
      "Decentralized — groups of users access hubs that have copies of the same ledger",
      "Permissioned — it uses access-control lists"],
    explain: "Decentralized has groups of users with access to hubs holding ledger copies. Distributed = every participant has a copy; Centralized = one central ledger." },
  { ch: 7, lo: "7.HARD", section: "Blockchain Types", type: "application",
    q: "A group of competing banks create a shared blockchain they jointly govern for trade-finance settlements. This is BEST described as:",
    options: ["Public blockchain", "Private blockchain", "Consortium blockchain", "Centralized ledger"],
    explain: "Consortium = multiple organizations jointly governing a blockchain." },
  { ch: 7, lo: "7.HARD", section: "Hash Strings in Audit", type: "application",
    q: "An auditor verifies that a contract stored on blockchain is unchanged by comparing its current hash string to the recorded hash. If the hashes differ:",
    options: [
      "The contract is definitively fraudulent and should be reported to regulators",
      "Something about the record has changed since the hash was recorded; further investigation is required",
      "The blockchain has failed entirely and the client should switch platforms",
      "The hash comparison is inconclusive and should be disregarded"],
    explain: "A hash mismatch means the record has changed; investigation is required to understand why." },
  { ch: 7, lo: "7.HARD", section: "External Auditor Caution", type: "application",
    q: "An external auditor plans to rely on blockchain-stored transactions. Which reliance assumption is INCORRECT per the chapter?",
    options: [
      "Auditors should assess general and application IT controls over the blockchain system",
      "Auditors can rely on the consensus protocol only after assessing its reliability",
      "Auditors can skip testing completeness and accuracy because records are immutable after entry",
      "Auditors should evaluate the automation features for lack of manual controls"],
    explain: "Immutability only protects records after entry; completeness and accuracy of what goes in must still be tested." },
  { ch: 7, lo: "7.HARD", section: "Data Transparency Trade-off", type: "application",
    q: "A private company considers moving AR records to a public blockchain to improve transparency but realizes some customer data would also become viewable. Which BEST characterizes the trade-off?",
    options: [
      "Transparency and privacy/confidentiality can be in tension on public chains; consortium or private blockchains may be needed to balance them",
      "Transparency is always advantageous without trade-offs",
      "Public blockchains allow selective field-level privacy by default",
      "Privacy laws do not apply to blockchain data"],
    explain: "Public transparency can conflict with privacy/confidentiality needs — private or consortium chains can mitigate." },
  { ch: 7, lo: "7.HARD", section: "Immutability Misconception", type: "application",
    q: "A client claims 'our blockchain is immutable, so we cannot have misstatements.' Why is this reasoning flawed?",
    options: [
      "Immutability means no participant can change entries; it does not mean the entries were correct when first recorded — substantive testing is still required",
      "Blockchain systems are not actually immutable in practice",
      "Misstatements only occur in paper-based systems",
      "All blockchain transactions are automatically audited by regulators"],
    explain: "Garbage-in still happens even when records cannot be changed after the fact; substantive testing is still needed." },
  { ch: 14, lo: "14.HARD", section: "COSO vs COBIT Scope", type: "application",
    q: "A CIO claims 'We already use COSO for internal control over financial reporting, so we don't need COBIT.' Which statement is the BEST counterpoint?",
    options: [
      "COBIT replaces COSO and should be adopted instead for all controls",
      "COSO covers corporate governance and all internal controls; COBIT 2019 addresses IT governance and IT-specific controls — they are complementary",
      "COBIT is mandated by the SEC for public companies regardless of COSO adoption",
      "COBIT only applies to non-US companies"],
    explain: "COSO = broad internal control framework; COBIT = IT governance specifically. They are complementary, not substitutes." },
  { ch: 14, lo: "14.HARD", section: "COBIT Domain Mapping", type: "application",
    q: "A help-desk team manages incident tickets, service restorations, and user support. Which COBIT 2019 domain BEST describes this?",
    options: ["EDM", "APO", "BAI", "DSS"],
    explain: "DSS = Deliver, Service, and Support — operational IT including help desk/support." },
  { ch: 14, lo: "14.HARD", section: "COBIT EDM vs MEA", type: "application",
    q: "A board-level committee evaluates whether the enterprise's IT strategy is meeting organizational objectives and provides strategic direction. Which domain BEST applies?",
    options: [
      "EDM, because the BOARD's role of evaluating stakeholder needs and directing IT strategy is governance",
      "MEA, because the committee evaluates whether existing IT projects meet objectives",
      "APO, because the committee is aligning IT to organizational direction",
      "BAI, because the committee is implementing strategy"],
    explain: "EDM is board-level governance (evaluate, direct, monitor); MEA is management-level assessment of existing IT against objectives." },
  { ch: 14, lo: "14.HARD", section: "RBAC vs Permissions", type: "memorization",
    q: "Which of the following statements about RBAC is MOST precise?",
    options: [
      "Permissions are assigned to users individually; roles simply describe user job titles with no enforcement",
      "Each user is assigned to only one role at a time; that role carries a bundle of predefined permissions",
      "Users inherit permissions from both their direct manager and the administrator simultaneously",
      "Roles can be created only for administrators; all other users receive ungrouped permissions"],
    explain: "RBAC binds permissions to roles; users are assigned to one role at a time." },
  { ch: 14, lo: "14.HARD", section: "Authentication Factor Distinction", type: "application",
    q: "An employee's access setup requires: (a) a password, (b) an ID badge scan, (c) a fingerprint. How many DISTINCT authentication factor types are in use?",
    options: ["One (all are identifiers for the same user)", "Two (the ID badge and fingerprint are the same factor type)", "Three (know / have / are)", "Four (know / have / are / do)"],
    explain: "Password = know; ID badge = have; fingerprint = are → three distinct factor types." },
  { ch: 14, lo: "14.HARD", section: "Provisioning vs Reviews", type: "application",
    q: "Which activity BEST helps detect dormant accounts?",
    options: ["User access provisioning", "User authentication", "User access reviews", "User access kickoff"],
    explain: "Periodic user access reviews examine existing users/roles — the primary control for dormant access." },
  { ch: 14, lo: "14.HARD", section: "Transfer Risk", type: "application",
    q: "When an employee transfers between departments, per the chapter the PRIMARY reason transfers require analysis is:",
    options: [
      "Transfers require a new manager before any access change",
      "Continued access from the prior role may violate segregation of duties or be unnecessary in the new role",
      "Transfers always lead to password reuse",
      "Transfers incur training costs"],
    explain: "Transfers can leave inappropriate residual access — the SoD risk is the core concern." },
  { ch: 14, lo: "14.HARD", section: "Data Center Location", type: "application",
    q: "A company is selecting a data-center location. Which pair BEST reflects the chapter's guidance?",
    options: [
      "Top floor, low-lying neighborhood (to maximize view)",
      "Bottom floors of a building on higher ground (to limit physical damage AND flooding risk)",
      "Mid-level floor, close to a river (for cooling water)",
      "Rooftop, lowest elevation (for easy access to utilities)"],
    explain: "Lower floors + high ground — a counterintuitive but chapter-recommended combination." },
  { ch: 14, lo: "14.HARD", section: "Three Key Environments", type: "memorization",
    q: "Which item is NOT one of the chapter's three key data-center environments?",
    options: ["Outside environment", "Inside environment", "Physical security", "Network configuration"],
    explain: "The three key environments are outside, inside, and physical security — not network configuration." },
  { ch: 14, lo: "14.HARD", section: "Hot vs Warm vs Cold", type: "application",
    q: "A company has a 24-hour RTO and can tolerate up to 24 hours of data loss but has a very tight budget. Which site is MOST appropriate?",
    options: ["Hot", "Warm", "Cold", "No backup site"],
    explain: "Warm sites match moderate RTO/RPO with lower cost than hot." },
  { ch: 14, lo: "14.HARD", section: "Hot Site Unique Risk", type: "application",
    q: "Which risk is UNIQUE to a hot backup site compared to warm and cold sites?",
    options: [
      "Longest recovery time",
      "No physical security controls",
      "A virus entering the live system is immediately replicated to the backup",
      "Highest downtime tolerance"],
    explain: "Continuous replication means malware is replicated — a unique hot-site risk." },
  { ch: 14, lo: "14.HARD", section: "RPO vs RTO Precision", type: "application",
    q: "Identify the pair that correctly matches metric to definition.",
    options: [
      "RPO = how long a system can be down; RTO = how much data may be lost",
      "RPO = how much data may be lost; RTO = how long a system can be down",
      "RPO = total cost of recovery; RTO = data sensitivity rating",
      "RPO = recovery price; RTO = recovery transit"],
    explain: "RPO is data-loss tolerance; RTO is downtime tolerance." },
  { ch: 14, lo: "14.HARD", section: "Full vs Differential vs Incremental", type: "application",
    q: "A company runs a full backup every Sunday. On Wednesday, they want to restore to the latest state using the SMALLEST set of backups. If they use INCREMENTAL daily backups, they will need to restore:",
    options: [
      "Sunday's full only",
      "Sunday's full plus Monday, Tuesday, and Wednesday incrementals",
      "Just Wednesday's incremental",
      "Sunday's full plus only Wednesday's incremental"],
    explain: "Incremental requires the last full plus every incremental since — more restore steps than differential." },
  { ch: 14, lo: "14.HARD", section: "Differential Restore", type: "application",
    q: "Same scenario: if the company runs DIFFERENTIAL daily backups, restoring to Wednesday requires:",
    options: ["Only Wednesday's differential", "Sunday's full plus Wednesday's differential", "Sunday's full plus every daily differential", "Nothing — differentials are self-contained"],
    explain: "Differential restore = last full + latest differential (since each differential is cumulative from the last full)." },
  { ch: 14, lo: "14.HARD", section: "Grandfather-Father-Son", type: "memorization",
    q: "In the GFS backup scheme, which matches are correct?",
    options: [
      "Grandfather = monthly full; Father = weekly full; Son = daily incremental/differential",
      "Grandfather = weekly full; Father = monthly incremental; Son = hourly differential",
      "Grandfather = daily full; Father = weekly differential; Son = monthly incremental",
      "Grandfather = annual full; Father = quarterly full; Son = monthly incremental"],
    explain: "GFS: monthly (grandfather), weekly (father), daily (son — incremental/differential)." },
  { ch: 14, lo: "14.HARD", section: "Change Environments", type: "application",
    q: "A DBA proposes debugging a live performance issue by running ad-hoc SQL on the production database. Under the chapter's change management model, this violates which principle?",
    options: [
      "Backups must always run before any query",
      "Changes must pass through isolated environments enforcing segregation of duties",
      "Production must never accept user logins",
      "RBAC forbids any DBA from accessing production"],
    explain: "Isolated environments (test/model/production) enforce SoD; ad-hoc live debugging bypasses this control." },
  { ch: 14, lo: "14.HARD", section: "Emergency Change Bypass", type: "application",
    q: "Per the chapter, which statement is CORRECT about emergency changes?",
    options: [
      "Emergency changes bypass the test environment and go directly from model to production",
      "Emergency changes bypass the model environment and move directly to production",
      "Emergency changes require unanimous board approval before execution",
      "Emergency changes skip change management entirely"],
    explain: "Emergency changes bypass model and move to production directly (test still occurs)." },
  { ch: 19, lo: "19.HARD", section: "Auditing Definition", type: "memorization",
    q: "Which statement BEST captures the chapter's definition of auditing?",
    options: [
      "A systematic and independent review of data, records, and operations providing assurance of internal-control effectiveness and process efficiency",
      "A management-led review that provides tax-compliance services",
      "A sales process aimed at convincing stakeholders the company is growing",
      "An external consulting engagement unrelated to internal controls"],
    explain: "Auditing = systematic/independent review for assurance on controls and process efficiency." },
  { ch: 19, lo: "19.HARD", section: "Audit Specialties Evolution", type: "memorization",
    q: "Historically auditors were grouped as operational, financial, and IT specialists. Companies today are moving toward:",
    options: [
      "A single specialty — only operational audit",
      "A unified audit approach in which employees from different audit specialties work together",
      "Fully external audit outsourcing",
      "Eliminating financial auditors entirely"],
    explain: "Unified audit approach — cross-specialty collaboration on an engagement." },
  { ch: 19, lo: "19.HARD", section: "External Auditor Focus", type: "application",
    q: "Per Table 19.2, an EXTERNAL auditor's primary purpose is:",
    options: [
      "Analyzing and improving controls for internal stakeholders",
      "Providing an opinion on the fair presentation of financial statements for external stakeholders",
      "Replacing the internal audit function",
      "Managing the client's daily operations"],
    explain: "External audit: opinion on fair presentation for external stakeholders." },
  { ch: 19, lo: "19.HARD", section: "Reporting Lines", type: "application",
    q: "A CFO asks why internal audit's reporting line matters. Per the chapter:",
    options: [
      "Internal audit reports only to the CFO; independence is preserved through physical separation",
      "Internal audit has a direct reporting line to the audit committee (even when administratively to the CFO/CCO) — preserving independence from operational management",
      "Internal audit reports only to external auditors for independence",
      "Internal audit has no reporting line; it operates unaccountably"],
    explain: "Direct line to audit committee preserves independence; administrative line may be CFO/CCO." },
  { ch: 19, lo: "19.HARD", section: "Big Four Misconception", type: "memorization",
    q: "Which statement about the Big Four accounting firms is CORRECT?",

function formatTime(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  return h > 0 ? h + ":" + pad(m) + ":" + pad(sec) : pad(m) + ":" + pad(sec);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(pool, exceptIndex) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return 0;
  let i = Math.floor(Math.random() * pool.length);
  while (i === exceptIndex) i = Math.floor(Math.random() * pool.length);
  return i;
}

                  key={lo}
                  onClick={() => setSelectedLO(lo)}
                  className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                  style={{
                    background: active ? CHAPTER_META[selectedChapter].accent : "transparent",
                    color: active ? "#fff" : "#78716c",
                    borderColor: active ? CHAPTER_META[selectedChapter].accent : "#d6d3d1",
                  }}
                  title={LO_META[lo]}
                >
                  LO {lo} · {LO_META[lo]}
                  <span className="ml-2 font-mono opacity-70">({count})</span>
                </button>
              );
            })}
          </div>
        )}

        {/* Type filter bar */}
        <div className="flex flex-wrap items-center gap-2 mb-6 pb-6 border-b border-stone-300">
          <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mr-2">Type:</span>
          {[
            { key: "all", label: "All" },
            { key: "application", label: "Application" },
            { key: "memorization", label: "Memorization" },
          ].map(({ key, label }) => {
            const active = typeFilter === key;
            const count = BANK.filter(q =>
              (selectedChapter === "all" || q.ch === selectedChapter) &&
              (selectedLO === "all" || q.lo === selectedLO) &&
              (key === "all" || q.type === key)
            ).length;
            return (
              <button
                key={key}
                onClick={() => setTypeFilter(key)}
                className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                style={{
                  background: active ? "#1c1917" : "transparent",
                  color: active ? "#fff" : "#78716c",
                  borderColor: active ? "#1c1917" : "#d6d3d1",
                }}
              >
                {label} <span className="font-mono opacity-70 ml-1">({count})</span>
              </button>
            );
          })}
          <span className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 hidden sm:inline">
            Keys: 1–4 · Enter
          </span>
        </div>

        {/* Progress & status row */}
        <div className="flex flex-wrap items-center gap-3 mb-6">
          <div className="flex-1 min-w-[180px]">
            <div className="flex items-center justify-between font-mono text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1.5">
              <span>Mastered this cycle</span>
              <span className="flex items-center gap-3">
                <span className="flex items-center gap-1.5">
                  <span className="tabular-nums text-stone-700" style={{ fontSize: 11 }}>{formatTime(timerElapsed)}</span>
                  <button
                    type="button"
                    onClick={() => { if (!cycleComplete) setTimerRunning(r => !r); }}
                    aria-label={timerRunning ? "Pause timer" : "Start timer"}
                    title={timerRunning ? "Pause timer" : "Start timer"}
                    disabled={cycleComplete}
                    style={{
                      width: 18, height: 18, padding: 0, border: "1px solid #d6d3d1",
                      borderRadius: 999, background: "#fff",
                      cursor: cycleComplete ? "default" : "pointer",
                      opacity: cycleComplete ? 0.5 : 1,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      color: "#1c1917",
                    }}
                  >
                    {timerRunning ? (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="2" height="6" /><rect x="5" y="1" width="2" height="6" /></svg>
                    ) : (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><path d="M1 1 L7 4 L1 7 Z" /></svg>
                    )}
                  </button>
                </span>
                <span>
                  {filteredPool.filter(q => answered[q.idx] === "correct").length} / {filteredPool.length}
                </span>
              </span>
            </div>
            <div className="flex gap-[2px] flex-wrap">
              {filteredPool.map(q => {
                const s = answered[q.idx];
                const isCurrent = current && current.q && current.q.idx === q.idx;
                const bg = s === "correct" ? "#16a34a" : s === "wrong" ? "#dc2626" : "#e7e5e4";
                const label = s === "correct" ? "Correct" : s === "wrong" ? "Wrong" : "Unseen";
                return (
                  <button
                    key={q.idx}
                    type="button"
                    onClick={() => jumpToQuestion(q)}
                    title={label + " — click to revisit"}
                    aria-label={"Jump to question: " + label}
                    style={{
                      width: 10, height: 10, borderRadius: 2, background: bg,
                      padding: 0, border: 0, cursor: "pointer",
                      outline: isCurrent ? "2px solid #1c1917" : "none",
                      outlineOffset: isCurrent ? 1 : 0,
                    }}
                  />
                );
              })}
            </div>
          </div>
        </div>

        {cycleComplete && (
          <div className="fade-in mb-6 rounded-2xl p-5 border" style={{ background: "#fff", borderColor: "#d6d3d1" }}>
            <div className="font-serif-display text-xl font-bold text-stone-900 mb-1">All mastered</div>
            <div className="text-sm text-stone-600 mb-3">
              You've answered all {filteredPool.length} questions in this filter correctly. Start a new cycle to go through them again.
            </div>
            <button
              onClick={startNewCycle}
              className="option-btn px-4 py-2 text-sm font-medium rounded-full text-white"
              style={{ background: "#1c1917" }}
            >
              Start new cycle
            </button>
          </div>
        )}


        {/* Question card */}
        {current ? (
          <div key={stats.total} className="fade-in">
            {/* Source metadata */}
            <div className="flex items-center gap-3 mb-4 flex-wrap">
              <span
                className="font-mono text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded"
                style={{
                  background: CHAPTER_META[current.q.ch].accent,
                  color: "#fff",
                }}
              >
                Ch {current.q.ch} · LO {current.q.lo}
              </span>
              <span className="font-mono text-xs text-stone-500">
                § {current.q.section}
              </span>
              <span
                className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] px-2 py-0.5 rounded border"
                style={{
                  borderColor: current.q.type === "application" ? "#d97706" : "#a8a29e",
                  color: current.q.type === "application" ? "#b45309" : "#78716c",
                  background: current.q.type === "application" ? "#fef3c7" : "transparent",
                }}
              >
                {current.q.type}
              </span>
            </div>

            {/* Question */}
            <div className="relative mb-7">
              <div className="absolute -left-3 top-0 bottom-0 w-0.5" style={{ background: CHAPTER_META[current.q.ch].accent, opacity: 0.3 }}/>
              <h2 className="font-serif-display text-2xl sm:text-[28px] leading-[1.25] text-stone-900 font-semibold pl-3">
                {current.q.q}
              </h2>
            </div>

            {/* Options */}
            <div className="space-y-2.5 mb-6">
              {current.shuffledOptions.map((opt, i) => {
                const isCorrect = i === current.correctShuffledIndex;
                const isSelected = i === selected;
                let bg = "#fff";
                let border = "#e7e5e4";
                let textColor = "#1c1917";
                let letterBg = "#f5f5f4";
                let letterColor = "#78716c";

                if (revealed) {
                  if (isCorrect) {
                    bg = "#f0fdf4";
                    border = "#16a34a";
                    letterBg = "#16a34a";
                    letterColor = "#fff";
                  } else if (isSelected) {
                    bg = "#fef2f2";
                    border = "#dc2626";
                    letterBg = "#dc2626";
                    letterColor = "#fff";
                  } else {
                    textColor = "#a8a29e";
                  }
                } else if (isSelected) {
                  border = "#1c1917";
                }

                return (
                  <button
                    key={i}
                    onClick={() => handleSelect(i)}
                    disabled={revealed}
                    className="option-btn w-full text-left px-4 py-3.5 rounded-lg border flex items-start gap-4 disabled:cursor-default"
                    style={{ background: bg, borderColor: border, color: textColor }}
                  >
                    <span
                      className="font-mono text-xs font-bold w-6 h-6 flex items-center justify-center rounded shrink-0 mt-0.5"
                      style={{ background: letterBg, color: letterColor }}
                    >
                      {String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-[15px] leading-snug flex-1">{opt}</span>
                    {revealed && isCorrect && (
                      <span className="text-green-600 font-bold text-lg">✓</span>
                    )}
                    {revealed && isSelected && !isCorrect && (
                      <span className="text-red-600 font-bold text-lg">✕</span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Explanation + next */}
            {revealed && (
              <div className="fade-in">
                <div className="border-t-2 border-dashed border-stone-300 pt-5 mb-5">
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
                    {selected === current.correctShuffledIndex ? "Correct" : "Answer"}
                  </div>
                  <p className="font-serif-display text-[17px] leading-relaxed text-stone-800 italic">
                    {current.q.explain}
                  </p>
                </div>
                <button
                  onClick={loadNext}
                  className="option-btn w-full sm:w-auto px-8 py-3 rounded-lg font-medium text-sm text-white"
                  style={{ background: "#1c1917" }}
                >
                  Next question →
                </button>
              </div>
            )}
          </div>
        ) : (
          <div className="text-center py-20 text-stone-500 font-serif-display italic">
            No questions in the selected scope.
          </div>
        )}

        {/* Footer */}
        <footer className="mt-16 pt-6 border-t border-stone-200 font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 flex flex-wrap justify-between gap-2">
          <span>{BANK.length} questions · {filteredPool.length} in scope</span>
          <span>Continuous review mode</span>
        </footer>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AISQuiz />);
  </script>
</body>
</html>
