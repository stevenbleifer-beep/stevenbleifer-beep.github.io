// Answer verification — correct answer is always at options[0]
(function(){BANK.forEach((q)=>{Object.defineProperty(q,'_x',{value:0,enumerable:false,configurable:false,writable:false});Object.freeze(q.options);Object.freeze(q);});Object.freeze(BANK);})();

const LOS_BY_CHAPTER = (function() {
  const map = {};
  BANK.forEach(q => {
    if (!map[q.ch]) map[q.ch] = [];
    if (!map[q.ch].includes(q.lo)) map[q.ch].push(q.lo);
  });
  return map;
})();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(pool, exceptIndex) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return 0;
  let i = Math.floor(Math.random() * pool.length);
  while (i === exceptIndex) i = Math.floor(Math.random() * pool.length);
  return i;
}

function formatTime(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  return h > 0 ? h + ":" + pad(m) + ":" + pad(sec) : pad(m) + ":" + pad(sec);
}

function AISQuiz() {
  const [selectedChapter, setSelectedChapter] = useState("all"); // "all" | 7 | 14 | 19
  const [selectedLO, setSelectedLO] = useState("all"); // "all" | "7.1" | "14.3" | etc.
  const [typeFilter, setTypeFilter] = useState("all");
  const [current, setCurrent] = useState(null);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  // Streaks are live counters (persisted separately from the mastered map).
  // correct/total/byChapter are DERIVED from `answered` so they stay in sync
  // with the "Mastered this cycle" graphic.
  const [streakState, setStreakState] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem("bs_ais_streak_v1"));
      if (s && typeof s === "object") {
        return { streak: s.streak || 0, bestStreak: s.bestStreak || 0 };
      }
    } catch(e) {}
    return { streak: 0, bestStreak: 0 };
  });
  const [answered, setAnswered] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bs_ais_answered_v1")) || {}; }
    catch(e) { return {}; }
  });
  const [cycleComplete, setCycleComplete] = useState(false);

  // Per-question timer (resets to 0 each new question) + persisted total time on page.
  const [timerElapsed, setTimerElapsed] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const [totalElapsed, setTotalElapsed] = useState(() => {
    try {
      const v = parseInt(localStorage.getItem("bs_ais_total_v1"), 10);
      return isFinite(v) && v >= 0 ? v : 0;
    } catch(e) { return 0; }
  });
  const [totalRunning, setTotalRunning] = useState(() => {
    try {
      const raw = localStorage.getItem("bs_ais_total_running_v1");
      if (raw === null) return true;
      return raw === "true";
    } catch(e) { return true; }
  });

  const stats = useMemo(() => {
    let correct = 0, total = 0;
    const byChapter = {};
    for (const key of Object.keys(answered)) {
      const q = BANK[key];
      if (!q) continue;
      const isCorrect = answered[key] === "correct";
      total++;
      if (isCorrect) correct++;
      const ch = q.ch;
      if (!byChapter[ch]) byChapter[ch] = { correct: 0, total: 0 };
      byChapter[ch].total++;
      if (isCorrect) byChapter[ch].correct++;
    }
    return { correct, total, byChapter, streak: streakState.streak, bestStreak: streakState.bestStreak };
  }, [answered, streakState]);

  const filteredPool = useMemo(() => {
    return BANK.map((q, i) => { const o = { ...q, idx: i }; Object.defineProperty(o,'_x',{value:q._x,enumerable:false,configurable:false,writable:false}); return o; })
      .filter(q => selectedChapter === "all" || q.ch === selectedChapter)
      .filter(q => selectedLO === "all" || q.lo === selectedLO)
      .filter(q => typeFilter === "all" || q.type === typeFilter);
  }, [selectedChapter, selectedLO, typeFilter]);

  useEffect(() => {
    try { localStorage.setItem("bs_ais_answered_v1", JSON.stringify(answered)); } catch(e) {}
  }, [answered]);

  useEffect(() => {
    try { localStorage.setItem("bs_ais_streak_v1", JSON.stringify(streakState)); } catch(e) {}
  }, [streakState]);

  // Timer: reset to 0 and auto-start on each new question; auto-stop on reveal.
  // Also stop (and prevent running) when the cycle is complete.
  useEffect(() => {
    if (cycleComplete) {
      setTimerRunning(false);
      return;
    }
    if (current && !revealed) {
      setTimerElapsed(0);
      setTimerRunning(true);
    } else if (revealed) {
      setTimerRunning(false);
    }
  }, [current, revealed, cycleComplete]);

  // Per-question timer tick.
  useEffect(() => {
    if (!timerRunning) return;
    const iv = setInterval(() => {
      setTimerElapsed(prev => prev + 1);
    }, 1000);
    return () => clearInterval(iv);
  }, [timerRunning]);

  // Total (cumulative) timer tick — independent of per-question; paused when cycle is complete
  // or the user presses the total play/pause button.
  useEffect(() => {
    if (!totalRunning || cycleComplete) return;
    const iv = setInterval(() => {
      setTotalElapsed(prev => {
        const next = prev + 1;
        try { localStorage.setItem("bs_ais_total_v1", String(next)); } catch(e) {}
        return next;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [totalRunning, cycleComplete]);

  // Persist totalRunning preference.
  useEffect(() => {
    try { localStorage.setItem("bs_ais_total_running_v1", String(totalRunning)); } catch(e) {}
  }, [totalRunning]);

  const loadNext = () => {
    if (filteredPool.length === 0) {
      setCurrent(null);
      setCycleComplete(false);
      return;
    }
    // Only pick from questions not yet answered correctly — wrong answers stay in the shuffle
    const unseen = filteredPool.filter(q => answered[q.idx] !== "correct");
    if (unseen.length === 0) {
      setCurrent(null);
      setCycleComplete(true);
      return;
    }
    const pick = unseen[Math.floor(Math.random() * unseen.length)];

    // shuffle options but track where correct went
    const indexed = pick.options.map((opt, i) => ({ opt, i }));
    const shuffled = shuffle(indexed);
    const correctShuffledIndex = shuffled.findIndex(s => s.i === pick._x);

    setCycleComplete(false);
    setCurrent({
      q: pick,
      shuffledOptions: shuffled.map(s => s.opt),
      correctShuffledIndex,
    });
    setSelected(null);
    setRevealed(false);
  };

  const jumpToQuestion = (q) => {
    // Show a specific question (click-through from tracker blocks) — reveal the answer so users can review
    const indexed = q.options.map((opt, i) => ({ opt, i }));
    const shuffled = shuffle(indexed);
    const correctShuffledIndex = shuffled.findIndex(s => s.i === q._x);
    setCycleComplete(false);
    setCurrent({
      q,
      shuffledOptions: shuffled.map(s => s.opt),
      correctShuffledIndex,
    });
    setSelected(null);
    setRevealed(false);
  };

  useEffect(() => {
    loadNext();
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    // When filters toggle, reset the active question
    loadNext();
    // eslint-disable-next-line
  }, [selectedChapter, selectedLO, typeFilter]);

  useEffect(() => {

    if (!current && !cycleComplete && filteredPool.length > 0) {

      if (!revealed && ["1","2","3","4"].includes(e.key)) {
        const i = parseInt(e.key, 10) - 1;
        if (i < current.shuffledOptions.length) {
          e.preventDefault();
          handleSelect(i);
        }
      } else if (revealed && (e.key === "Enter" || e.key === " ")) {
        e.preventDefault();
        loadNext();
      }
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
    // eslint-disable-next-line
  }, [current, revealed]);

  const handleSelect = (i) => {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    const correct = i === current.correctShuffledIndex;
    setAnswered(prev => ({ ...prev, [current.q.idx]: correct ? "correct" : "wrong" }));
    setStreakState(prev => {
      const newStreak = correct ? prev.streak + 1 : 0;
      return {
        streak: newStreak,
        bestStreak: Math.max(prev.bestStreak, newStreak),

  };

    setSelectedChapter(ch);
    setSelectedLO("all"); // reset LO filter when chapter changes
  };

    setStreakState({ streak: 0, bestStreak: 0 });

    setTimerElapsed(0);
    setTimerRunning(false);
    setTotalElapsed(0);
    setTotalRunning(true);
    try { localStorage.removeItem("bs_ais_answered_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_ais_streak_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_ais_total_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_ais_total_running_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_ais_stats_v1"); } catch(e) {} // legacy cleanup
    try { localStorage.removeItem("bs_ais_timer_v1"); } catch(e) {} // legacy cleanup
    loadNext();
  };

  const startNewCycle = () => {
    setAnswered({});
    setStreakState({ streak: 0, bestStreak: 0 });
    setCycleComplete(false);
    try { localStorage.removeItem("bs_ais_answered_v1"); } catch(e) {}
    try { localStorage.removeItem("bs_ais_streak_v1"); } catch(e) {}

  const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;

  return (
    <div className="min-h-screen w-full" style={{

              <div>

        {/* Question card */}
        {current ? (
          <div key={stats.total} className="fade-in">
            {/* Source metadata */}
            <div className="flex items-center gap-3 mb-4 flex-wrap">
              <span
                className="font-mono text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded"
                style={{
                  background: CHAPTER_META[current.q.ch].accent,
                  color: "#fff",
                }}
              >
                {(typeof current.q.ch === "number" ? "Ch " + current.q.ch : current.q.ch) + " · " + (typeof current.q.ch === "number" ? "LO " + current.q.lo : current.q.lo)}
              </span>
              <span className="font-mono text-xs text-stone-500">
                § {current.q.section}
              </span>
              <span
                className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] px-2 py-0.5 rounded border"
                style={{
                  borderColor: current.q.type === "application" ? "#d97706" : "#a8a29e",
                  color: current.q.type === "application" ? "#b45309" : "#78716c",
                  background: current.q.type === "application" ? "#fef3c7" : "transparent",
                }}
              >
                {current.q.type}
              </span>
            </div>

            {/* Question */}
            <div className="relative mb-7">
              <div className="absolute -left-3 top-0 bottom-0 w-0.5" style={{ background: CHAPTER_META[current.q.ch].accent, opacity: 0.3 }}/>
              <h2 className="font-serif-display text-2xl sm:text-[28px] leading-[1.25] text-stone-900 font-semibold pl-3">
                {current.q.q}
              </h2>
            </div>

            {/* Options */}
            <div className="space-y-2.5 mb-6">
              {current.shuffledOptions.map((opt, i) => {
                const isCorrect = i === current.correctShuffledIndex;
                const isSelected = i === selected;
                let bg = "#fff";
                let border = "#e7e5e4";
                let textColor = "#1c1917";
                let letterBg = "#f5f5f4";
                let letterColor = "#78716c";

                if (revealed) {
                  if (isCorrect) {
                    bg = "#f0fdf4";
                    border = "#16a34a";
                    letterBg = "#16a34a";
                    letterColor = "#fff";
                  } else if (isSelected) {
                    bg = "#fef2f2";
                    border = "#dc2626";
                    letterBg = "#dc2626";
                    letterColor = "#fff";
                  } else {
                    textColor = "#a8a29e";
                  }
                } else if (isSelected) {
                  border = "#1c1917";
                }

                return (
                  <button
                    key={i}
                    onClick={() => handleSelect(i)}
                    disabled={revealed}
                    className="option-btn w-full text-left px-4 py-3.5 rounded-lg border flex items-start gap-4 disabled:cursor-default"
                    style={{ background: bg, borderColor: border, color: textColor }}
                  >
                    <span
                      className="font-mono text-xs font-bold w-6 h-6 flex items-center justify-center rounded shrink-0 mt-0.5"
                      style={{ background: letterBg, color: letterColor }}
                    >
                      {String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-[15px] leading-snug flex-1">{opt}</span>
                    {revealed && isCorrect && (
                      <span className="text-green-600 font-bold text-lg">✓</span>
                    )}
                    {revealed && isSelected && !isCorrect && (
                      <span className="text-red-600 font-bold text-lg">✕</span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Explanation + next */}
            {revealed && (
              <div className="fade-in">
                <div className="border-t-2 border-dashed border-stone-300 pt-5 mb-5">
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
                    {selected === current.correctShuffledIndex ? "Correct" : "Answer"}
                  </div>
                  <p className="font-serif-display text-[17px] leading-relaxed text-stone-800 italic">
                    {current.q.explain}
                  </p>
                </div>
                <button
                  onClick={loadNext}
                  className="option-btn w-full sm:w-auto px-8 py-3 rounded-lg font-medium text-sm text-white"
                  style={{ background: "#1c1917" }}
                >
                  Next question →
                </button>
              </div>
            )}
          </div>
        ) : (
          <div className="text-center py-20 text-stone-500 font-serif-display italic">
            No questions in the selected scope.
          </div>
        )}

        {/* Footer */}
        <footer className="mt-16 pt-6 border-t border-stone-200 font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 flex flex-wrap justify-between gap-2">
          <span>{BANK.length} questions · {filteredPool.length} in scope</span>
          <span>Continuous review mode</span>
        </footer>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AISQuiz />);
  </script>
</body>
</html>
