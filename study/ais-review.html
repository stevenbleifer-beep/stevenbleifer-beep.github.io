    options: [
      "Natural disasters damaging equipment",
      "Unauthorized physical access leading to theft or data breaches",
      "Failure to maintain facilities per regulations",
      "A user forgetting their password"],
    explain: "Forgotten passwords are a logical access issue, not a physical security risk." },
  { ch: 14, lo: "14.4", section: "BCP vs DR", type: "memorization",
    q: "What is the relationship between Business Continuity Planning (BCP) and Disaster Recovery (DR)?",
    options: [
      "They are two names for the same thing",
      "DR is a subset of BCP; BCP keeps business processes running while DR keeps technology running",
      "BCP is a subset of DR",
      "They are unrelated functions handled by different companies"],
    explain: "DR (technology focus) is a subset of BCP (overall business process continuity)." },
  { ch: 14, lo: "14.4", section: "Backup Sites", type: "memorization",
    q: "Which backup site is immediately operational after a disaster but is also the most expensive?",
    options: ["Cold backup site", "Warm backup site", "Hot backup site", "Mirror backup site"],
    explain: "Hot sites run continuously with continuous backup — fastest recovery, highest cost." },
  { ch: 14, lo: "14.4", section: "Backup Sites", type: "memorization",
    q: "A cold backup site has:",
    options: [
      "Fully operational servers running continuously with real-time synchronized data ready for immediate failover activation",
      "Pre-configured servers and network equipment partially installed and ready to be activated within a few hours",
      "Only physical space, power, climate control, and physical security — no installed servers or data",
      "Live mirrored backups of all customer-facing applications and databases updated on a continuous real-time basis"],
    explain: "Cold sites are essentially empty rooms; recovery takes days to weeks." },
  { ch: 14, lo: "14.4", section: "Backup Sites Trade-offs", type: "application",
    q: "A company with moderate tolerance for downtime and a tight budget would MOST likely choose:",
    options: ["Hot backup site", "Warm backup site", "Cold backup site", "No backup site"],
    explain: "Warm sites balance cost and recovery speed — ideal for moderate tolerance and budget constraints." },
  { ch: 14, lo: "14.4", section: "Hot site risk", type: "application",
    q: "Which risk is UNIQUE to a hot backup site?",
    options: [
      "It takes weeks to become operational",
      "A virus entering the live system is immediately backed up to the hot site",
      "It lacks physical security",
      "It has no climate control"],
    explain: "Continuous replication means malware is replicated just as quickly as valid data." },
  { ch: 14, lo: "14.4", section: "RTO vs RPO", type: "memorization",
    q: "Recovery Time Objective (RTO) measures:",
    options: [
      "How much data can be lost before it causes significant damage",
      "How much time a system can be down before it causes significant damage to the business",
      "The physical distance between a primary and backup site",
      "The number of users allowed at the backup site"],
    explain: "RTO = how long the system can be down. RPO = how much data can be lost." },
  { ch: 14, lo: "14.4", section: "RTO vs RPO", type: "application",
    q: "A bank states: 'We cannot lose more than 15 minutes of transaction data.' This is a statement about:",
    options: ["RTO", "RPO", "BCP scope", "Hot site cost"],
    explain: "Data loss tolerance is RPO. Time-to-recover would be RTO." },
  { ch: 14, lo: "14.4", section: "Backup Strategies", type: "memorization",
    q: "Which backup strategy copies ALL data in its entirety every time, regardless of what changed?",
    options: ["Incremental", "Differential", "Full", "Snapshot"],
    explain: "Full backups copy everything — slowest and most storage-intensive." },
  { ch: 14, lo: "14.4", section: "Backup Strategies", type: "memorization",
    q: "A differential backup copies:",
    options: [
      "All new or updated data since the last backup of any type",
      "All data created since the most recent FULL backup",
      "Only system files, never user data",
      "All data including deleted files"],
    explain: "Differential = all changes since last full backup. Incremental = changes since any last backup." },
  { ch: 14, lo: "14.4", section: "Backup Strategies", type: "application",
    q: "A company does full backups weekly on Sunday. On Tuesday, what would a DIFFERENTIAL backup capture vs. an INCREMENTAL backup?",
    options: [
      "They would be identical",
      "Differential = changes since Sunday; Incremental = changes since Monday's backup",
      "Differential captures nothing; incremental captures everything",
      "Differential captures only user files; incremental captures only system files"],
    explain: "Differential always references the last full backup. Incremental only captures changes since the most recent backup of any type." },
  { ch: 14, lo: "14.4", section: "Grandfather-father-son", type: "memorization",
    q: "In the grandfather-father-son redundant backup scheme, the 'son' cycle represents:",
    options: [
      "A monthly full backup",
      "A weekly full backup",
      "A daily incremental or differential backup",
      "An annual full backup"],
    explain: "Grandfather = monthly full; Father = weekly full; Son = daily incremental/differential." },
  { ch: 14, lo: "14.5", section: "Change Management", type: "memorization",
    q: "The three stages of a formal change management process are:",
    options: [
      "Draft, Review, Approve",
      "Test, Model, Production",
      "Plan, Build, Deploy",
      "Identify, Assess, Remediate"],
    explain: "Test (sandbox) → Model (mirrors live) → Production (live)." },
  { ch: 14, lo: "14.5", section: "Test Environment", type: "memorization",
    q: "The test environment is often called a 'sandbox' because:",
    options: [
      "It uses sand-colored user interfaces",
      "Developers can play and make changes without impacting the actual system",
      "It is physically located near a beach",
      "It only accepts certain file types"],
    explain: "Sandbox = safe place to experiment without touching production." },
  { ch: 14, lo: "14.5", section: "Model Environment", type: "memorization",
    q: "The model environment is a:",
    options: [
      "An architectural blueprint and formal technical specification document outlining the planned design of the future system",
      "Recent copy of the live system used to test code in an environment that closely resembles production",
      "A written onboarding and training manual used by developers to learn system architecture, processes, and workflows",
      "A marketing demonstration build of the product used to showcase upcoming features to prospective clients and investors"],
    explain: "Model = near-production replica where users and IT analysts validate changes before deployment." },
  { ch: 14, lo: "14.5", section: "Segregation of Duties", type: "application",
    q: "Why does the change management process use three separate environments with different access?",
    options: [
      "To satisfy a COBIT 2019 governance requirement and provide documented evidence of IT compliance for external auditors reviewing the organization",
      "To enforce segregation of duties — developers write code, users and IT analysts approve in model, and Production Control (who cannot modify code) deploys",
      "To distribute IT development workload evenly across multiple specialized teams and prevent any single group from becoming a capacity bottleneck",
      "To prevent the production environment from crashing due to the combined resource demands of simultaneous development testing and live user activity"],
    explain: "Separation enforces that no single person can write code, approve it, and deploy it — key SoD control." },
  { ch: 14, lo: "14.5", section: "Normal vs Emergency", type: "memorization",
    q: "An emergency change differs from a normal change because:",
    options: [
      "It requires additional sign-offs from senior IT leadership, a full regression test suite, and a longer staged timeline before any deployment to production is allowed",
      "It bypasses the MODEL environment and moves directly from test to production to address urgent risks, with documentation completed afterward (typically within 24–48 hours)",
      "It is a special restricted change category that applies exclusively to physical hardware replacements, server upgrades, and data center infrastructure modifications",
      "It mandates written pre-approval from the full board of directors and the external audit committee before any code change can be deployed to the production environment"],
    explain: "Emergency changes skip model for speed; post-implementation documentation and approvals happen within 24–48 hours." },
  { ch: 14, lo: "14.5", section: "Emergency changes", type: "application",
    q: "Which scenario would MOST appropriately use the emergency change process?",
    options: [
      "Adding a new report feature requested by the CFO for next quarter",
      "Deploying a zero-day security patch to stop an active vulnerability",
      "Updating a recurring report title for clarity",
      "Renaming a menu option"],
    explain: "Active security risks justify emergency changes. Everything else follows the normal process." },
  { ch: 14, lo: "14.5", section: "Production environment", type: "memorization",
    q: "Who implements code into the production environment in a well-controlled change management process?",
    options: [
      "The developer who wrote the code",
      "The business user who requested the change",
      "A Production Control employee who cannot modify the code",
      "The external auditor"],
    explain: "Production Control deploys but can't modify code — this preserves SoD with development and testing." },
  { ch: 19, lo: "19.1", section: "Auditing Definition", type: "memorization",
    q: "Auditing is best defined as:",
    options: [
      "The preparation and issuance of a company's financial statements in accordance with generally accepted accounting principles",
      "The systematic and independent review of data, information, records, and operations of a business to provide assurance on internal controls and process efficiency",
      "A fee-based advisory engagement in which an external consultant reviews financial records and recommends strategies to minimize the client's overall corporate tax obligations",
      "The preparation of quarterly marketing reports summarizing financial performance metrics for external stakeholder distribution"],
    explain: "Audit = systematic, INDEPENDENT review providing assurance." },
  { ch: 19, lo: "19.1", section: "Audit Specializations", type: "memorization",
    q: "Historically, auditors were divided into which three groups by expertise?",
    options: [
      "Operational/business, financial, and IT auditors",
      "Internal, external, and government auditors",
      "Tax, audit, and advisory",
      "Junior, senior, and manager auditors"],
    explain: "Operational/business, financial, and IT were the three traditional specializations." },
  { ch: 19, lo: "19.1", section: "Big Four", type: "memorization",
    q: "The 'Big Four' accounting firms are:",
    options: [
      "PwC, Deloitte, EY, and KPMG",
      "PwC, Deloitte, EY, and Grant Thornton",
      "PwC, Deloitte, KPMG, and BDO",
      "EY, KPMG, BDO, and RSM"],
    explain: "PwC, Deloitte, EY, and KPMG — the Big Four." },
  { ch: 19, lo: "19.1", section: "External Auditor role", type: "memorization",
    q: "The primary purpose of an EXTERNAL audit is to:",
    options: [
      "Evaluate and improve the design and operating effectiveness of the company's internal controls and operational processes",
      "Express an opinion on whether financial statements are presented fairly, in all material respects, in accordance with applicable standards (e.g., GAAP)",
      "Provide management consulting and process improvement recommendations to help the company operate more efficiently",
      "Prepare and file the company's annual federal and state income tax returns and advise the board of directors on tax planning strategies"],
    explain: "External auditors opine on fair presentation of financial statements — that's their primary purpose." },
  { ch: 19, lo: "19.1", section: "Internal Audit role", type: "memorization",
    q: "The primary purpose of an INTERNAL audit is to:",
    options: [
      "Issue an opinion on the financial statements to shareholders",
      "Analyze and improve controls and performance of the business, reporting to internal stakeholders",
      "File SEC regulatory reports",
      "Audit other accounting firms"],
    explain: "Internal audit focuses on internal control and performance improvement for internal stakeholders." },
  { ch: 19, lo: "19.1", section: "Hiring", type: "memorization",
    q: "Who typically appoints external auditors?",
    options: [
      "Selected and contracted directly by the company's CFO based on fee negotiations and prior engagement history",
      "Recommended by the audit committee and appointed by the shareholders",
      "Selected by the internal audit director and overseen by the CFO",
      "Assigned by the SEC based on the company's industry, size, and prior audit deficiency history"],
    explain: "Audit committee recommends; shareholders appoint. This preserves independence." },
  { ch: 19, lo: "19.1", section: "Certifications", type: "memorization",
    q: "Which certification is common to BOTH internal AND external auditors per the chapter?",
    options: [
      "Certified Internal Auditor (CIA)",
      "Certified Fraud Examiner (CFE)",
      "Certified Public Accountant (CPA)",
      "Chartered Financial Analyst (CFA)"],
    explain: "CPA appears on both lists; CISA is also shared. CIA and CFE are internal-focused." },
  { ch: 19, lo: "19.1", section: "Three Lines Model", type: "application",
    q: "In the IIA's Three Lines Model, internal audit represents:",
    options: [
      "The first line (provision of products/services and managing risk)",
      "The second line (expertise, support, monitoring, and risk challenge)",
      "The third line (independent and objective assurance)",
      "External assurance providers"],
    explain: "Third line = internal audit's independent assurance. External auditors sit outside the three lines as external assurance providers." },
  { ch: 19, lo: "19.1", section: "Reliance", type: "application",
    q: "External auditors may use internal audit's work to obtain audit evidence, but they are always responsible for:",
    options: [
      "Paying internal audit for the work",
      "Verifying the accuracy and reliability of the internal audit department's work",
      "Firing internal audit if errors are found",
      "Publishing the internal audit's findings publicly"],
    explain: "External auditors can leverage IA work but must verify it — otherwise internal audit could hide misstatements." },
  { ch: 19, lo: "19.2", section: "Stages", type: "memorization",
    q: "The five sequential stages of an audit engagement are:",
    options: [
      "Scope, Test, Report, Close, File",
      "Planning, Fieldwork, Wrap-up, Reporting, Follow-up",
      "Identify, Assess, Respond, Monitor, Communicate",
      "Risk assessment, Walkthrough, Sampling, Opinion, Archive"],
    explain: "Planning → Fieldwork → Wrap-up → Reporting → Follow-up." },
  { ch: 19, lo: "19.2", section: "Audit Plan", type: "memorization",
    q: "An audit plan is:",
    options: [
      "A detailed checklist used during a single audit engagement to document each specific test performed by the auditor",
      "A complete list of all audit engagements the internal audit team will perform in the upcoming period",
      "A formal engagement letter prepared by an external auditor outlining the scope, objectives, and fees for an audit",
      "A mandatory disclosure filed with the SEC detailing the planned internal audit activities for the coming fiscal year"],
    explain: "The audit plan is the full roster of planned engagements for the period, derived from risk assessment." },
  { ch: 19, lo: "19.2", section: "Agile Auditing", type: "memorization",
    q: "A rolling audit plan is associated with which methodology?",
    options: ["Waterfall auditing", "Agile auditing", "Six Sigma auditing", "Lean auditing"],
    explain: "Agile auditing uses rolling, prioritized audit plans and shorter sprints." },
  { ch: 19, lo: "19.2", section: "Planning Deliverables", type: "memorization",
    q: "The planning stage of an audit produces which two primary deliverables?",
    options: [
      "Workpapers and draft report",
      "Scoping document and audit canvas (or planning memo)",
      "Management action plan and final report",
      "Risk register and remediation plan"],
    explain: "Planning deliverables: scoping document + audit canvas (Agile) or planning memo (traditional)." },
  { ch: 19, lo: "19.2", section: "Scoping Document", type: "memorization",
    q: "A scoping document describes:",
    options: [
      "A document that outlines the auditor's hourly billing rates, estimated hours, and total engagement fees for the period",
      "The areas of the process subject to audit, including identified risks, relevant controls, and their likelihood and impact",
      "A summary document outlining the company's strategic marketing objectives and competitive positioning for the year",
      "A one-page timeline listing key audit milestones and deliverable due dates for each phase of the engagement"],
    explain: "Scoping document lists in-scope processes, risks, controls, and impact/likelihood ratings." },
  { ch: 19, lo: "19.2", section: "Audit Canvas", type: "memorization",
    q: "An audit canvas is:",
    options: [
      "The physical background on which audit reports are printed",
      "An Agile version of the audit planning memo",
      "A checklist used during fieldwork",
      "The final audit report format"],
    explain: "Audit canvas = Agile planning memo capturing why, scope, team, stakeholders, and timelines." },
  { ch: 19, lo: "19.2", section: "Audit Deliverable", type: "application",
    q: "An internal auditor gives the auditee a preliminary observation during fieldwork. This is an example of:",
    options: [
      "A planning deliverable completed before fieldwork begins, such as the scoping document or the audit engagement memo",
      "An audit deliverable — formal communication of results or plans between internal audit and the auditee/stakeholders",
      "A mandatory SEC filing that internal audit teams submit when they identify a potential material misstatement",
      "A tax workpaper prepared by the accounting department to support deferred tax positions on the financial statements"],
    explain: "Audit deliverables are formal communications at each stage — planning, fieldwork (preliminary observations), wrap-up, reporting, follow-up." },
  { ch: 19, lo: "19.3", section: "Fieldwork", type: "memorization",
    q: "The three important parts of audit fieldwork are:",
    options: [
      "Planning, testing, reporting",
      "Information gathering, tests of controls, substantive procedures",
      "Walkthrough, inquiry, reperformance",
      "Design, implementation, evaluation"],
    explain: "Fieldwork = information gathering + tests of controls + substantive procedures." },
  { ch: 19, lo: "19.3", section: "Process Walkthrough", type: "memorization",
    q: "A process walkthrough is:",
    options: [
      "A physical tour of the data center",
      "An interview where auditees explain their daily job functions to the auditor",
      "A detailed review of the company's website",
      "A meeting with external auditors only"],
    explain: "Walkthrough = interview-based information gathering where employees describe how they do their job." },
  { ch: 19, lo: "19.3", section: "Design vs Operating", type: "memorization",
    q: "Design effectiveness tests assess whether a control:",
    options: [
      "Was actually performed consistently throughout the reporting period by the employee responsible for executing it",
      "If operated as prescribed, meets the company's control objectives and effectively prevents or detects errors or fraud",
      "Produces a reconciled output that feeds directly into the financial statements without further human review",
      "Has been reviewed and certified as compliant with applicable GDPR data protection and privacy requirements"],
    explain: "Design = 'would this work IF run as intended?' — assessed assuming the control operates exactly as designed." },
  { ch: 19, lo: "19.3", section: "Design vs Operating", type: "memorization",
    q: "Which test is UNIQUE to operating effectiveness (not part of design effectiveness)?",
    options: ["Inquiry", "Observation", "Inspection", "Reperformance"],
    explain: "Reperformance — independently recreating the control — is unique to operating effectiveness. Inquiry, observation, and inspection apply to both." },
  { ch: 19, lo: "19.3", section: "Design vs Operating", type: "application",
    q: "An auditor reviews the written policy requiring dual approval of all wire transfers over $10,000 and concludes the control, if followed, would prevent unauthorized transfers. The auditor has tested:",
    options: [
      "Operating effectiveness via reperformance",
      "Design effectiveness via inspection",
      "Substantive procedures",
      "Information gathering via walkthrough"],
    explain: "Reviewing policy documents to conclude the control WOULD work = design effectiveness via inspection." },
  { ch: 19, lo: "19.3", section: "Tests of Controls vs Substantive", type: "memorization",
    q: "Tests of controls differ from substantive procedures because tests of controls:",
    options: [
      "Detect and quantify specific dollar misstatements in the underlying financial data or transaction records",
      "Assess whether a control is well-designed and operating effectively — they do NOT identify misstatements",
      "Must be completed exclusively by external auditors as part of their financial statement audit engagement",
      "Require the use of automated data analytics software to analyze the full population of transactions in scope"],
    explain: "Tests of controls evaluate controls; substantive procedures test the underlying data for misstatements." },
  { ch: 19, lo: "19.3", section: "Substantive Procedures", type: "memorization",
    q: "Substantive procedures are primarily used to:",
    options: [
      "Confirm that a specific internal control is designed appropriately and would prevent errors if operated as intended",
      "Determine if material misstatements (due to error or fraud) exist in the underlying data",
      "Document the current-period risk assessment and revise the audit plan based on changes in the control environment",
      "Onboard and certify new staff auditors by walking them through the client's key business processes and systems"],
    explain: "Substantive procedures focus on the data itself — did errors/fraud creep into the numbers?" },
  { ch: 19, lo: "19.3", section: "Document Request", type: "memorization",
    q: "A document request is:",
    options: [
      "A mandatory disclosure required by Sarbanes-Oxley Section 404 to be submitted to the SEC before fieldwork begins",
      "A formal list of all documentation needed for an audit — flowcharts, org charts, presentations, raw data",
      "A written rebuttal prepared by the client in response to preliminary audit findings during the exit meeting process",
      "A standardized invoice template the audit firm uses to bill the client for completed fieldwork hours and expenses"],
    explain: "Document request = the formal ask for evidence the auditor needs to perform testing." },
  { ch: 19, lo: "19.4", section: "Wrap-up", type: "memorization",
    q: "Workpapers are:",
    options: [
      "The final audit report delivered to the auditee, summarizing all findings, recommendations, management responses, and agreed-upon remediation timelines",
      "The formal documentation of control testing — including steps taken, observations, and results — compiled during fieldwork and referenced in the audit report",
      "Marketing brochures and capability presentations the audit firm uses to attract new clients and describe its services",
      "The client's audited financial statements as prepared by management and reviewed for fair presentation by the auditor"],
    explain: "Workpapers document all testing and support the audit report's findings." },
  { ch: 19, lo: "19.4", section: "Draft Report", type: "memorization",
    q: "Audit findings are:",
    options: [
      "Positive feedback and satisfaction ratings submitted by the client summarizing their experience with the audit team",
      "Written explanations of errors, improper activities, control weaknesses or deficiencies, and discovered fraud",
      "Line-item invoices from the audit firm detailing the hours worked, billing rates, and total fees charged per engagement",
      "Official press releases issued by the audit firm to publicly disclose significant deficiencies found during fieldwork"],
    explain: "Findings = problems identified — errors, control weaknesses, fraud, etc." },
  { ch: 19, lo: "19.4", section: "Management Response", type: "memorization",
    q: "After the first draft audit report is complete, the auditor meets with the auditee in a(n):",
    options: ["Kickoff meeting", "Walkthrough", "Exit meeting", "Scoping session"],
    explain: "The exit meeting is where findings are discussed and management provides its response/remediation plan." },
  { ch: 19, lo: "19.4", section: "Management Response", type: "memorization",
    q: "Management's response to audit findings should include:",
    options: [
      "A formal written denial of each finding, supported by management's reasoning for why the finding is not valid",
      "A plan for remediation AND a timeline for when the business will implement the agreed-upon remediation",
      "Only the name and title of the employee directly responsible for the control failure identified in the finding",
      "A revised engagement fee proposal reflecting additional consulting hours needed to assist management with remediation"],
    explain: "The response must include both the remediation plan and a timeline — documented alongside audit recommendations." },
  { ch: 19, lo: "19.4", section: "Audit Recommendations", type: "memorization",
    q: "Audit recommendations typically include:",
    options: [
      "Strategic marketing advice and competitive positioning recommendations to help the business improve its brand",
      "The cause of the issue, root cause details, and suggested actions management can take to address findings",
      "A detailed cost-benefit analysis quantifying the financial investment required to implement the proposed control fix",
      "A formal legal opinion on litigation risk and potential regulatory penalties associated with the identified finding"],
    explain: "Recommendations address cause, root cause, and suggested corrective actions." },
  { ch: 19, lo: "19.4", section: "Follow-up", type: "application",
    q: "An internal audit identifies NO findings during the engagement. At which stage does the engagement end?",
    options: ["Planning", "Fieldwork", "Reporting", "Follow-up"],
    explain: "If there are no findings, there is nothing to remediate — the engagement ends at reporting. Follow-up is only needed when findings exist." },
  { ch: 19, lo: "19.4", section: "Follow-up", type: "memorization",
    q: "During follow-up meetings, auditors rely on:",
    options: [
      "Only the auditee's verbal assurances",
      "Information from the auditees AND supporting evidence documenting the changes implemented",
      "Only their own observations without auditee input",
      "External consultants hired by management"],
    explain: "Auditors need both auditee info AND evidence of implemented changes — assertions alone aren't enough." },
  { ch: 19, lo: "19.4", section: "Final Report", type: "memorization",
    q: "The final audit report is distributed to:",
    options: [
      "Shared exclusively within the internal audit team and retained as a confidential reference for future engagements",
      "The auditees and their leadership (which may include a VP, CEO, or other key leaders)",
      "Published on the company's public investor relations website as part of the annual governance disclosure package",
      "Transmitted only to the external audit firm for review as part of their reliance on internal audit procedures"],
    explain: "Final report goes to auditees and their leadership — VPs, CEOs, key company leaders — to drive action." },
  { ch: 7, lo: "7.1", section: "Adoption Curve", type: "application",
    q: "A mid-sized accounting firm waits until peers publish case studies with help, support, and knowledge resources before adopting a new AI audit tool. Which adopter category does this firm fit?",
    options: ["Innovators", "Early Adopters", "Late Majority", "Laggards"],
    explain: "Late Majority joins once help, support, and knowledge exist — low risk tolerance, prefers clarity before adopting." },
  { ch: 7, lo: "7.1", section: "Emerging vs Disruptive", type: "application",
    q: "Five years ago, cloud ERP systems were rare. Today, most large accounting firms require clients to use cloud-based GL systems to enable continuous auditing. Cloud ERP has moved from:",
    options: [
      "Disruptive to widely used only",
      "Emerging to disruptive — now changing how businesses function",
      "Widely used back to emerging",
      "Emerging directly to widely used, skipping disruptive"],
    explain: "The path is emerging → disruptive → widely used. Forcing firms to adapt their operations is the hallmark of the disruptive phase." },
  { ch: 7, lo: "7.2", section: "IoT wearables", type: "application",
    q: "A life insurance company offers policyholders lower premiums if they wear a fitness tracker that reports steps, heart rate, and sleep quality. This primarily uses IoT to:",
    options: [
      "Automate premium billing by connecting payment systems to policyholder accounts and generating invoices without human input",
      "Leverage big data from wearables to estimate longevity and price premiums individually",
      "Prevent unauthorized access to policyholder account data by using biometric authentication from wearable devices",
      "Replace the actuarial underwriting function by automating all risk assessment decisions through machine learning algorithms"],
    explain: "Chapter 7 specifically cites life insurance using wearables to monitor health metrics and estimate longevity for individualized premiums." },
  { ch: 7, lo: "7.2", section: "VR in business", type: "application",
    q: "A retail chain uses VR headsets during store employee training so new hires can practice responding to an armed robbery. The BEST reason VR is used here:",
    options: [
      "VR hardware has a lower total cost of ownership than hiring live role-players or constructing physical training sets",
      "It replicates high-stress scenarios that are difficult or dangerous to recreate in reality",
      "VR training programs are legally mandated by OSHA for all customer-facing retail employees handling security incidents",
      "VR systems automatically reduce employee headcount by replacing in-person HR-led training sessions permanently"],
    explain: "Training employees for high-stress or dangerous scenarios is one of the most popular business uses of VR per the chapter." },
  { ch: 7, lo: "7.2", section: "Autonomous Things", type: "application",
    q: "An auditor uses drones equipped with cameras to perform physical inventory counts across an 80-acre outdoor lumberyard. This illustrates:",
    options: [
      "An IoT consumer product that connects personal devices to the internet to collect and transmit lifestyle data",
      "An autonomous thing (AuT) improving audit efficiency through physical inventory counts",
      "A blockchain application that creates an immutable digital record of each inventory item scanned by the drone",
      "A gamification technique that motivates auditors by turning inventory counting into a competitive, points-based activity"],
    explain: "Drones performing physical inventory counts is explicitly listed as an AuT business opportunity in the chapter." },
  { ch: 7, lo: "7.3", section: "RPA accounting use cases", type: "application",
    q: "Which of the following accounts payable tasks is LEAST suitable for RPA?",
    options: [
      "Extracting invoice data from structured emails and entering it into the AP system",
      "Sending an automated reply when an invoice email arrives with no attachment",
      "Negotiating payment terms with a new vendor over the phone",
      "Comparing invoice totals against POs and flagging variances"],
    explain: "Negotiation requires judgment and adaptation — the antithesis of rigid rule-based RPA. The other three are routine, digital, and rule-driven." },
  { ch: 7, lo: "7.3", section: "RPA efficiency", type: "application",
    q: "An RPA bot handles 5,000 identical invoice confirmations per day. A new vendor sends a confirmation in a slightly different email format. The bot:",
    options: [
      "Will automatically adapt by learning the new format",
      "Will likely fail or produce errors because it cannot deviate from pre-programmed orders",
      "Will escalate the issue to an AI system for handling",
      "Will email the vendor asking them to resend"],
    explain: "RPA's biggest limitation is rigidity. AI would adapt; RPA cannot. This is why format changes require bot updates." },
  { ch: 7, lo: "7.4", section: "Ledger types", type: "application",
    q: "A consortium of five banks wants to share a transaction ledger, but each bank wants to maintain control over access for its own customers via its own hub. Which ledger type fits?",
    options: ["Centralized", "Decentralized (hub-based)", "Distributed", "Permissionless public"],
    explain: "Decentralized ledgers use hubs — groups of users access copies through their own hub. Centralized = one ledger; distributed = everyone has a full copy." },
  { ch: 7, lo: "7.4", section: "Decentralization value", type: "application",
    q: "Alice in Detroit wires $1,000 to Bob in Cape Town through a traditional bank, paying $50 in service fees. A decentralized blockchain transfer would primarily reduce cost by:",
    options: [
      "Increasing the strength of encryption used during transmission, making the wire transfer faster and more secure",
      "Eliminating the need for an intermediary to process, validate, and authenticate the transaction",
      "Making the transfer untraceable by routing funds through anonymized nodes outside any legal jurisdiction",
      "Routing the transaction through a government-approved digital currency exchange that charges a flat regulatory fee"],
    explain: "Decentralization removes the intermediary (the bank) — which is the entity collecting the fees." },
  { ch: 7, lo: "7.5", section: "Risks of blockchain auditing", type: "application",
    q: "An external auditor of a client using blockchain for revenue transactions is MOST concerned about which risk?",
    options: [
      "Revenue transactions being stored as paper records rather than in the blockchain, creating reconciliation gaps",
      "Undisclosed side agreements outside of the blockchain that could distort the economic substance of transactions",
      "The blockchain network running out of available storage capacity, causing new transactions to be dropped or delayed",
      "Miners being underpaid for validation work, reducing their incentive to verify transactions accurately and promptly"],
    explain: "Side agreements outside the blockchain are explicitly listed as a risk — blockchain reliability doesn't guarantee economic substance is properly reflected." },
  { ch: 14, lo: "14.1", section: "COBIT domains", type: "application",
    q: "A company's IT department is preparing its annual review of how existing IT projects are performing against organizational objectives. Which COBIT domain covers this?",
    options: [
      "Evaluate, Direct, and Monitor (EDM)",
      "Align, Plan, and Organize (APO)",
      "Build, Acquire, and Implement (BAI)",
      "Monitor, Evaluate, and Assess (MEA)"],
    explain: "MEA focuses on EXISTING IT projects and whether they're meeting organizational objectives. EDM is board-level governance direction-setting." },
  { ch: 14, lo: "14.1", section: "COBIT domains", type: "application",
    q: "The board of directors is deciding which IT strategic options to prioritize for the next three years and how to monitor their progress. This falls under:",
    options: ["APO", "BAI", "DSS", "EDM"],
    explain: "EDM is the only governance-focused domain: the board evaluates, directs, and monitors IT strategy." },
  { ch: 14, lo: "14.1", section: "COBIT Acronyms", type: "memorization",
    q: "What does the COBIT 2019 governance domain 'EDM' stand for?",
    options: [
      "Enable, Deploy, and Manage",
      "Execute, Document, and Maintain",
      "Evaluate, Direct, and Monitor",
      "Establish, Determine, and Measure"],
    explain: "EDM — Evaluate, Direct, and Monitor — is the sole governance-focused domain in COBIT 2019. The board evaluates options, directs management, and monitors performance." },
  { ch: 14, lo: "14.1", section: "COBIT Acronyms", type: "memorization",
    q: "In COBIT 2019, the management domain 'APO' stands for:",
    options: [
      "Align, Plan, and Organize",
      "Assess, Prepare, and Operate",
      "Approve, Produce, and Oversee",
      "Audit, Protect, and Optimize"],
    explain: "APO — Align, Plan, and Organize — covers aligning IT strategy with business objectives and planning how IT supports those goals." },
  { ch: 14, lo: "14.1", section: "COBIT Acronyms", type: "memorization",
    q: "Which phrase does the COBIT 2019 acronym 'BAI' represent?",
    options: [
      "Benchmark, Advise, and Integrate",
      "Balance, Allocate, and Invest",
      "Budget, Authorize, and Install",
      "Build, Acquire, and Implement"],
    explain: "BAI — Build, Acquire, and Implement — is the management domain where IT requirements are assessed and new technology is developed, purchased, and put into production." },
  { ch: 14, lo: "14.1", section: "COBIT Acronyms", type: "memorization",
    q: "The COBIT 2019 management domain 'DSS' stands for:",
    options: [
      "Define, Staff, and Supervise",
      "Deliver, Service, and Support",
      "Design, Secure, and Sustain",
      "Develop, Standardize, and Simplify"],
    explain: "DSS — Deliver, Service, and Support — covers day-to-day IT operations: service delivery, user support, and incident response." },
  { ch: 14, lo: "14.1", section: "COBIT Acronyms", type: "memorization",
    q: "What does the COBIT 2019 domain 'MEA' stand for?",
    options: [
      "Manage, Execute, and Audit",
      "Maintain, Evaluate, and Approve",
      "Measure, Enforce, and Adjust",
      "Monitor, Evaluate, and Assess"],
    explain: "MEA — Monitor, Evaluate, and Assess — reviews how existing IT projects are performing against organizational objectives and compliance requirements." },
  { ch: 14, lo: "14.2", section: "Authentication", type: "application",
    q: "A hospital requires nurses to badge in AND scan a fingerprint to access patient records. Which identifier categories are in use?",
    options: [
      "Something you know + something you have",
      "Something you have + something you are",
      "Something you know + something you are",
      "Something you know only"],
    explain: "Badge = something you have; fingerprint = something you are. Two different factor categories = true multifactor." },
  { ch: 14, lo: "14.2", section: "De-provisioning", type: "application",
    q: "An employee is terminated on Friday afternoon. What is the appropriate access-removal process?",
    options: [
      "Wait for the next quarterly access review to remove access",
      "Access should be immediately revoked — further approvals are rarely required because removing access does not create risk",
      "Require the employee's manager to re-approve termination before access is removed",
      "Keep access active for 30 days in case the employee returns"],
    explain: "Terminations trigger immediate revocation. Unlike transfers, removing access doesn't create risk, so approvals aren't typically needed." },
  { ch: 14, lo: "14.2", section: "RBAC", type: "application",
    q: "A company needs to grant read-only GL access to all new hires in finance. Under RBAC, the BEST approach is:",
    options: [
      "Have the administrator manually configure individual permissions for each new hire",
      "Assign each new hire to a predefined 'Finance Read-Only' role that bundles the required permissions",
      "Grant creator access and let the user self-restrict",
      "Give everyone administrator access temporarily"],
    explain: "RBAC's point is to eliminate per-user permission programming. Assign the role; permissions follow." },
  { ch: 14, lo: "14.3", section: "Physical controls", type: "application",
    q: "An internal auditor is reviewing controls at a remote data center. Which observation would be MOST concerning?",
    options: [
      "Badges are required to enter the server room",
      "The access log shows three terminated employees still have active badge access from last quarter",
      "Fire suppression systems were tested last month",
      "The server room is on the basement level of a building on high ground"],
    explain: "Dormant physical access for terminated employees violates the 'access periodically reviewed; inappropriate access immediately revoked' control." },
  { ch: 14, lo: "14.4", section: "Backup strategy selection", type: "application",
    q: "A company performs full backups on Sunday and uses INCREMENTAL backups daily. On Thursday at 2 PM the system fails. To restore, the company must apply:",
    options: [
      "Only Sunday's full backup, since it contains the most complete snapshot of all data before the failure occurred",
      "Sunday's full backup PLUS Monday, Tuesday, and Wednesday's incremental backups in sequence",
      "Only Wednesday's incremental backup, since it is the most recent backup taken before the Thursday failure",
      "Thursday's partial morning backup only, since it is the closest in time to the point-of-failure timestamp"],
    explain: "Incremental backups don't build on each other — each contains only changes since the last backup of ANY type. All intermediate increments must be applied." },
  { ch: 14, lo: "14.4", section: "Backup strategy selection", type: "application",
    q: "A company performs full backups on Sunday and uses DIFFERENTIAL backups daily. On Thursday at 2 PM the system fails. To restore, the company must apply:",
    options: [
      "Sunday's full backup plus Monday, Tuesday, AND Wednesday's differentials",
      "Only Sunday's full backup",
      "Sunday's full backup PLUS Wednesday's differential backup (which already contains Mon–Wed changes)",
      "Nothing — differentials are standalone"],
    explain: "Each differential contains all changes since the last full backup, so only the most recent differential + the last full is needed. This is differential's advantage over incremental for restore." },
  { ch: 14, lo: "14.4", section: "BCP scope", type: "application",
    q: "A hurricane knocks out the primary office building for two weeks. Disaster Recovery focuses on restoring systems; Business Continuity additionally addresses:",
    options: [
      "Only the restoration of critical data from backup tapes and the redeployment of core IT infrastructure systems",
      "Employee welfare, alternative work arrangements, vendor communications, and overall business process continuity",
      "Only the physical replacement and reconfiguration of servers, networking equipment, and on-premises hardware",
      "Only the submission of mandatory regulatory filings to government agencies required during a declared disaster event"],
    explain: "BCP is broader than DR. It covers employees, stakeholders, and all business processes — not just technology recovery." },
  { ch: 14, lo: "14.5", section: "Change process", type: "application",
    q: "A developer writes code in test, then pushes directly to production without going through the model environment. This is a violation UNLESS:",
    options: [
      "The developer has over ten years of experience and a demonstrated record of zero production defects",
      "It is a formally authorized emergency change, with documentation and approvals completed within 24–48 hours",
      "The code change is fewer than one hundred lines and poses no risk of affecting any existing system functionality",
      "The developer has personally notified the CFO and received verbal confirmation to proceed with the deployment"],
    explain: "Only emergency changes bypass model — and only with formal authorization and post-deployment documentation/approval." },
  { ch: 14, lo: "14.5", section: "SoD in change management", type: "application",
    q: "Which scenario violates segregation of duties in change management?",
    options: [
      "A developer writes code that an IT analyst then tests in the model environment",
      "A Production Control employee deploys code but cannot modify it",
      "A developer writes, tests, approves, AND deploys their own code into production",
      "The business user approves the outcome of the code in the model environment"],
    explain: "The three-environment structure exists to prevent exactly this — one person writing, approving, and deploying creates fraud and error risk." },
  { ch: 14, lo: "14.SOC", section: "SOC Report Types", type: "memorization",
    q: "A SOC 1 report covers controls at a service organization that are relevant to:",
    options: [
      "User entities' internal control over financial reporting",
      "The trust service criteria such as security, availability, and processing integrity",
      "General cybersecurity hygiene of any third-party vendor that handles customer data",
      "Publicly disclosed operational metrics that any stakeholder may freely review and distribute"],
    explain: "SOC 1 (formerly SAS 70, now under SSAE 18) focuses on controls at a service organization relevant to user entities' financial reporting — the report financial auditors request." },
  { ch: 14, lo: "14.SOC", section: "SOC Report Types", type: "memorization",
    q: "Which five Trust Service Criteria are the basis for a SOC 2 report?",
    options: [
      "Security, availability, processing integrity, confidentiality, and privacy",
      "Accuracy, completeness, timeliness, authorization, and validity",
      "Encryption, authentication, firewalling, patching, and logging",
      "Governance, risk, compliance, continuity, and vendor management"],
    explain: "SOC 2 is built on the AICPA's five Trust Service Criteria: security, availability, processing integrity, confidentiality, and privacy." },
  { ch: 14, lo: "14.SOC", section: "SOC Report Types", type: "memorization",
    q: "A SOC 3 report evaluates the same Trust Service Criteria as a SOC 2 but differs in one key way. What is that difference?",
    options: [
      "SOC 3 is intended for general public distribution and contains no restricted-use detail, while SOC 2 is restricted to specified parties",
      "SOC 3 covers financial reporting controls for service organizations, while SOC 2 covers operational and IT controls",
      "SOC 3 is issued by the PCAOB for public companies, while SOC 2 is issued by the AICPA for private entities only",
      "SOC 3 requires on-site testing over a 12-month period, while SOC 2 only evaluates controls at a single point in time"],
    explain: "SOC 3 uses the same Trust Service Criteria as SOC 2 but is designed for public distribution — it can be posted on a website or shared freely. SOC 2 is restricted-use." },
  { ch: 14, lo: "14.SOC", section: "SOC Report Selection", type: "application",
    q: "An external auditor is reviewing a company that outsources payroll processing to a third-party provider. The auditor is concerned about whether the processor's controls could affect the company's financial statements. Which report should the auditor request?",
    options: [
      "SOC 1, because it covers controls at a service organization relevant to user entities' financial reporting",
      "SOC 2, because it evaluates the payroll processor's security, availability, and processing integrity controls",
      "SOC 3, because it is the only report available to external parties reviewing a service organization's operations",
      "A management representation letter, because SOC reports are only required for publicly traded companies"],
    explain: "A payroll processor handles transactions that flow into the financial statements. SOC 1 addresses controls at service organizations relevant to user entities' financial reporting — exactly what this auditor needs." },
  { ch: 14, lo: "14.SOC", section: "SOC 2 Type I vs Type II", type: "memorization",
    q: "What is the key difference between a SOC 2 Type I and a SOC 2 Type II report?",
    options: [
      "Type I evaluates the design of controls at a specific point in time; Type II evaluates whether controls operated effectively over a defined period",
      "Type I covers all five Trust Service Criteria; Type II covers only security and availability as its minimum required scope",
      "Type I is restricted to internal management use only; Type II is available to customers and external stakeholders upon request",
      "Type I is issued after a 12-month audit period; Type II is issued after a point-in-time inspection of documented procedures"],
    explain: "SOC 2 Type I = controls suitably designed? (point in time). SOC 2 Type II = controls actually operated effectively? (over 6–12 months) — making Type II the stronger assurance." },
  { ch: 14, lo: "14.ACCESS-SIZE", section: "Segregation of Duties", type: "application",
    q: "An auditor reviews a 5-person accounting firm and finds that one employee both enters vendor invoices in the AP system and approves the resulting payments. How should the auditor respond?",
    options: [
      "Flag it as a segregation of duties risk and note that compensating controls such as owner review of payment reports may be a realistic mitigation given the firm's size",
      "Require the firm to immediately hire a second employee dedicated solely to payment approval before the audit can be completed",
      "Treat the finding as immaterial because small businesses are exempt from SoD requirements under GAAS",
      "Recommend automating the AP process with RPA, which would eliminate the need for human segregation of duties controls"],
    explain: "In a 5-person firm, full SoD may be impractical. The auditor should flag the risk and assess compensating controls — such as the owner independently reviewing payment runs — as a realistic alternative mitigation." },
  { ch: 14, lo: "14.ACCESS-SIZE", section: "RBAC and Business Size", type: "application",
    q: "Which access control practice is routinely practical for a large enterprise but generally impractical for a small startup with three employees?",
    options: [
      "Maintaining fully segregated role-based access control with distinct roles for each functional area and no role overlap",
      "Requiring employees to use unique usernames and passwords to authenticate before accessing company systems",
      "Removing system access promptly when an employee is terminated or leaves the organization",
      "Conducting periodic reviews of user access to confirm that permissions still match current job responsibilities"],
    explain: "Fully segregated RBAC requires enough headcount to staff each role separately. A three-person startup cannot segregate duties to that degree without crippling operations — compensating controls are required instead." },
  { ch: 14, lo: "14.ACCESS-SIZE", section: "User Roles Hierarchy", type: "application",
    q: "The owner of a 3-person company wants to monitor financial records and catch errors but should not be able to alter any transactions. An IT consultant also needs to manage user accounts. What access levels best fit each person?",
    options: [
      "Owner: read-only access for oversight; IT consultant: administrator access to manage user accounts",
      "Owner: administrator access so they can override controls when needed; IT consultant: creator access to post entries",
      "Owner: creator access to enter adjustments at period-end; IT consultant: read-only access to review the system configuration",
      "Owner: user access to post transactions; IT consultant: read-only access to review the system configuration"],
    explain: "Read-only lets the owner monitor records without risking unauthorized changes. Administrator access enables the IT consultant to provision and manage user accounts without touching financial data." },
  { ch: 19, lo: "19.1", section: "Internal vs External", type: "application",
    q: "A company's head of financial reporting asks the audit team to help document a newly implemented ASC 606 revenue process. This assistance is MOST consistent with:",
    options: [
      "An external auditor performing their core statutory role",
      "An internal auditor assisting management with a critical project",
      "A regulator's compliance review",
      "A tax audit"],
    explain: "Assisting management with critical projects is explicitly listed as an internal audit focus area. External auditors cannot help document client processes due to independence." },
  { ch: 19, lo: "19.1", section: "Auditor independence", type: "application",
    q: "An external audit partner is offered a position on the audit client's board. Accepting this role would:",
    options: [
      "Be generally acceptable because deeper knowledge of the client improves the quality and efficiency of audit work",
      "Violate external auditor independence — external auditors opine on financial statements and must remain independent of the company",
      "Be permitted as long as the dual role is disclosed in the engagement letter and noted in the final audit report",
      "Be explicitly required under Sarbanes-Oxley to ensure audit partners have sufficient governance oversight experience"],
    explain: "External auditors cannot be employed by the company they audit. Independence is foundational to the opinion on fair presentation." },
  { ch: 19, lo: "19.2", section: "Audit stages", type: "application",
    q: "An internal auditor is reviewing prior-year workpapers, meeting with the auditee to discuss risks, and creating a scoping document. Which stage is the audit in?",
    options: ["Planning", "Fieldwork", "Wrap-up", "Follow-up"],
    explain: "Risk assessment, prior workpaper review, and the scoping document are all planning-stage activities." },
  { ch: 19, lo: "19.2", section: "Agile auditing", type: "application",
    q: "An internal audit department finds that by mid-year, a risky new business process has emerged that wasn't in the original annual audit plan. Under AGILE auditing, the team would:",
    options: [
      "Wait until next year's plan to address it",
      "Reprioritize its rolling audit plan to include the new area as warranted",
      "Perform the audit only if the CFO demands it",
      "Refer the issue to external auditors"],
    explain: "Agile auditing uses a rolling, prioritized audit plan that adapts as risks emerge — a core advantage over 12-month static plans." },
  { ch: 19, lo: "19.3", section: "Controls vs substantive", type: "application",
    q: "An auditor verifies that 25 of 25 sampled journal entries over $100K had evidence of CFO approval, as required by policy. This is a test of:",
    options: [
      "Design effectiveness only, since the auditor evaluated the policy requirement rather than inspecting actual approvals",
      "Operating effectiveness of the control — the auditor verifies the control is actually being performed as designed",
      "A substantive procedure, since the auditor examined financial transaction data to identify potential dollar misstatements",
      "A process walkthrough in which the auditor traces one transaction from initiation to recording to understand the flow"],
    explain: "Checking that the control actually happened (approvals were obtained) tests operating effectiveness via inspection." },
  { ch: 19, lo: "19.3", section: "Controls vs substantive", type: "application",
    q: "An auditor recalculates depreciation expense for all fixed assets using the company's stated method and finds a $4.2M misstatement. This is an example of:",
    options: [
      "A test of design effectiveness",
      "A test of operating effectiveness",
      "A substantive procedure — testing the underlying data for misstatements",
      "Information gathering"],
    explain: "Recalculating to detect misstatements in data = substantive procedure. It doesn't assess controls directly." },
  { ch: 19, lo: "19.3", section: "Design vs operating", type: "application",
    q: "Which testing technique is NOT available when evaluating DESIGN effectiveness?",
    options: ["Inquiry", "Observation", "Inspection", "Reperformance"],
    explain: "Reperformance is unique to operating effectiveness — you can only reperform a control that's actually being performed." },
  { ch: 19, lo: "19.4", section: "Wrap-up and reporting", type: "application",
    q: "During an exit meeting, the auditee strongly disputes a finding and refuses to provide a remediation plan. The auditor should:",
    options: [
      "Remove the finding from the audit report to avoid conflict and preserve the working relationship with the auditee",
      "Document the auditee's response (including the disagreement) and the auditor's recommendation; escalate per the audit charter if needed",
      "Terminate the auditee's employment for failure to cooperate with the internal audit process and audit charter obligations",
      "Suspend the issuance of the audit report indefinitely until the auditee and auditor reach a mutually agreeable resolution"],
    explain: "Management's response — including disagreements — is documented along with audit recommendations. The auditor does not suppress findings." },
  { ch: 19, lo: "19.4", section: "Follow-up", type: "application",
    q: "An audit identified three findings six months ago. During follow-up, management claims all three are remediated but provides no documentation. The auditor should:",
    options: [
      "Accept management's verbal assertion as sufficient evidence and immediately close all three findings in the audit system",
      "Rely on both information from the auditee AND request supporting evidence (such as documentation of the implemented changes) before closing findings",
      "Reopen the entire original audit from the planning phase and repeat all fieldwork procedures before reassessing remediation",
      "Transfer the unresolved findings directly to the external auditors for independent verification and follow-up testing"],
    explain: "Follow-up requires supporting evidence — documentation of the implemented changes — not just auditee assertions." },
  { ch: 7, lo: "7.1", section: "Rogers' Adoption Curve", type: "memorization",
    q: "According to the Rogers Adoption Curve, which group represents 13.5% of businesses and has resources and influence to adopt new technology shortly after Innovators?",
    options: ["Innovators", "Early Adopters", "Early Majority", "Late Majority"],
    explain: "Early Adopters (~13.5%) have the resources and influence to adopt shortly after Innovators." },
  { ch: 7, lo: "7.1", section: "Rogers' Adoption Curve", type: "memorization",
    q: "On the Rogers Adoption Curve, which group adopts only after technology is clearly proven and usually only because they have no other viable business choice?",
    options: ["Early Majority", "Late Majority", "Innovators", "Early Adopters"],
    explain: "Late Majority (34%) is skeptical and only adopts once technology is well-proven." },
  { ch: 7, lo: "7.1", section: "Emerging vs Disruptive", type: "application",
    q: "A startup is deploying a technology used by only a handful of companies across its industry. Based on the chapter's definitions, this technology is currently:",
    options: ["Disruptive", "Emerging", "Legacy", "Obsolete"],
    explain: "Emerging technologies are new to market and not yet regularly used. They become disruptive only once widespread adoption forces companies to adapt." },
  { ch: 7, lo: "7.1", section: "Emerging vs Disruptive", type: "memorization",
    q: "A disruptive technology is characterized by the fact that it:",
    options: [
      "Has been proven in R&D but is not yet used by any companies",
      "Forces companies to adapt their operations to stay competitive",
      "Replaces every prior technology on a one-for-one basis",
      "Is used exclusively by accounting firms"],
    explain: "Disruptive tech forces companies to change operations in order to stay competitive." },
  { ch: 7, lo: "7.1", section: "Risks of New Tech", type: "memorization",
    q: "Which of the following is NOT one of the risk categories the chapter associates with emerging and disruptive technologies?",
    options: ["Business disruption", "Financial loss", "Security vulnerabilities", "Guaranteed product failure"],
    explain: "The chapter lists business disruption, financial loss, security vulnerabilities, and regulatory risk — not 'guaranteed failure.'" },
  { ch: 7, lo: "7.1", section: "Risk Oversight Teams", type: "memorization",
    q: "The three teams the chapter identifies as supporting oversight of technology risks and controls are:",
    options: ["Internal Audit, External Audit, Board of Directors", "Internal Audit, ERM, Emerging Technology COE", "IT Department, Legal, Compliance", "Finance, Operations, HR"],
    explain: "Internal Audit, ERM, and the Emerging Technology Center of Excellence support oversight of tech risks." },
  { ch: 7, lo: "7.1", section: "Internal Audit Role", type: "application",
    q: "Internal audit's responsibility when auditing emerging technologies includes all of the following EXCEPT:",
    options: [
      "Understanding which technologies are being used",
      "Recommending new controls to management",
      "Approving the implementation of new technology on behalf of management",
      "Remaining professionally skeptical about management's risk assessments"],
    explain: "Internal audit provides assurance and recommendations — it does not approve technology deployments, which is a management responsibility." },
  { ch: 7, lo: "7.1", section: "ERM", type: "memorization",
    q: "The Enterprise Risk Management (ERM) team works most closely with which department to strategize and approve emerging technologies?",
    options: ["Internal Audit", "Information Technology", "Human Resources", "Accounts Payable"],
    explain: "ERM works with IT to strategize and approve emerging technology the company implements." },
  { ch: 7, lo: "7.1", section: "COE", type: "memorization",
    q: "A Center of Excellence (COE) is BEST described as:",
    options: [
      "A government agency that certifies emerging technology vendors",
      "A specialized team providing unique support to the entire business",
      "A cross-industry consortium that sets accounting standards",
      "A division of internal audit that performs financial testing"],
    explain: "A COE is an in-house specialized team supporting the whole business, typically with technological expertise." },
  { ch: 7, lo: "7.1", section: "Adoption Risk", type: "application",
    q: "A manufacturing company classified as Early Majority is assessing whether to adopt a proven disruptive technology. Which risk is LEAST likely to apply to this decision?",
    options: [
      "Security vulnerabilities from integration with existing systems",
      "Regulatory risk if the technology is subject to new compliance rules",
      "The risk of being first-to-market with an unproven technology",
      "Financial loss if implementation costs exceed projected benefits"],
    explain: "First-to-market risk is borne by Innovators and Early Adopters; by the time the Early Majority adopts, the technology is already proven." },
  { ch: 7, lo: "7.1", section: "Tech Lifecycle", type: "memorization",
    q: "In the chapter's framing, successful new technologies follow which sequence?",
    options: ["Disruptive → Emerging → Widely used", "Emerging → Disruptive → Widely used", "Widely used → Emerging → Disruptive", "Emerging → Widely used → Disruptive"],
    explain: "Successful tech starts emerging, becomes disruptive as adoption grows, then becomes widely used." },
  { ch: 7, lo: "7.1", section: "Adoption Curve Resources", type: "application",
    q: "Which Rogers Adoption Curve group is specifically noted as having sufficient financial resources to absorb losses from being first to market?",
    options: ["Innovators", "Laggards", "Late Majority", "Early Majority"],
    explain: "Innovators (2.5%) are risk-takers with resources to absorb financial failures associated with being first." },
  { ch: 7, lo: "7.2", section: "Internet of Things", type: "memorization",
