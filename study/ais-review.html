      "A form used to reset a password",
      "A physical badge granting facility entry"],
    explain: "Permissions are privileges that come with a role." },
  { ch: 14, lo: "14.2", section: "User Role Hierarchy", type: "memorization",
    q: "Which of the following accurately reflects the hierarchy of user roles (highest to lowest)?",
    options: ["Read-Only → User → Creator → Administrator", "Administrator → Creator → User → Read-Only", "User → Read-Only → Creator → Administrator", "Creator → User → Administrator → Read-Only"],
    explain: "Admin > Creator > User > Read-Only." },
  { ch: 14, lo: "14.2", section: "Authentication", type: "memorization",
    q: "User authentication is the process of:",
    options: [
      "Granting new users access for the first time",
      "Associating the username of each authorized user with a unique identifier",
      "Removing access when an employee leaves",
      "Encrypting a user's passwords for storage"],
    explain: "Authentication links a username to an identifier proving they are who they say they are." },
  { ch: 14, lo: "14.2", section: "MFA", type: "memorization",
    q: "Multifactor authentication occurs when:",
    options: [
      "A user is prompted to enter a password twice",
      "A strong combination of identifiers is required when a user logs in",
      "Two users share the same password",
      "A user's badge is scanned by a physical guard"],
    explain: "MFA requires a combination of identifier types (know/have/are)." },
  { ch: 14, lo: "14.2", section: "Authentication Categories", type: "memorization",
    q: "A password is an example of authentication based on:",
    options: ["Something the user knows", "Something the user has", "Something the user is", "Something the user does"],
    explain: "Passwords and PINs are 'something you know.'" },
  { ch: 14, lo: "14.2", section: "Biometric Authentication", type: "application",
    q: "A retina scan is authentication based on:",
    options: ["Something the user has", "Something the user knows", "Something the user is", "Something the user approves"],
    explain: "Biometrics (retina, fingerprint, voice) are 'something you are.'" },
  { ch: 14, lo: "14.2", section: "Provisioning", type: "memorization",
    q: "User access provisioning is:",
    options: ["The process of changing a user's access", "The formal process of granting access to a new user", "The removal of a user's account after termination", "The periodic review of existing user roles"],
    explain: "Provisioning = formal process of granting new access." },
  { ch: 14, lo: "14.2", section: "De-provisioning", type: "application",
    q: "An employee transfers from Marketing to Finance and no longer needs campaign-management access. The removal of her old permissions is:",
    options: ["Access provisioning", "Access de-provisioning", "Access dormancy", "Access authentication"],
    explain: "De-provisioning includes both termination and transfer-related access changes." },
  { ch: 14, lo: "14.2", section: "Dormant Access Risk", type: "application",
    q: "A user access review uncovers several accounts unused for 12 months but still active. The PRIMARY risk is:",
    options: [
      "The accounts take up too much disk space",
      "Dormant accounts can be exploited for unauthorized access, fraud, or breaches",
      "The accounts require additional training",
      "The accounts are at greater risk of triggering password-reset emails"],
    explain: "Dormant but active accounts increase risk of unauthorized use, fraud, and breaches." },
  { ch: 14, lo: "14.2", section: "Logical Controls Failure", type: "application",
    q: "Failure of logical access controls may result in ALL of the following EXCEPT:",
    options: ["Employee fraud", "Malicious attacks on systems and data", "Data breaches", "Natural disaster damaging the data center"],
    explain: "Natural disaster is a physical-security risk, not a logical-access failure." },
  { ch: 14, lo: "14.3", section: "Data Center", type: "memorization",
    q: "A data center is defined as:",
    options: [
      "A cloud-only offering with no physical footprint",
      "An area (or whole building) dedicated to the physical storage of computer and telecommunications systems",
      "A rented conference room used for board meetings",
      "A commercial warehouse that stores printed documents"],
    explain: "Data center = physical area (or building) for IT and telecom equipment." },
  { ch: 14, lo: "14.3", section: "Data Center Alt Name", type: "memorization",
    q: "A data center is also known as a:",
    options: ["Risk Operations Center (ROC)", "Network Operations Center (NOC)", "Compliance Operations Center (COC)", "System Operations Bay (SOB)"],
    explain: "Data center = NOC (Network Operations Center)." },
  { ch: 14, lo: "14.3", section: "Onsite vs Offsite", type: "memorization",
    q: "Data centers can be:",
    options: ["Only onsite", "Only offsite", "Either onsite or offsite", "Only in government buildings"],
    explain: "Data centers may be onsite (within a company facility) or offsite (elsewhere)." },
  { ch: 14, lo: "14.3", section: "Inside Environment", type: "memorization",
    q: "Why do most data centers have their own air-conditioning units and chilled rooms?",
    options: ["To reduce employee commute times", "To prevent equipment from overheating", "To store physical paper records", "Because regulators require pink walls"],
    explain: "Cooling prevents overheating of densely packed server equipment." },
  { ch: 14, lo: "14.3", section: "Operations Center", type: "memorization",
    q: "The operations center within a data center is where:",
    options: [
      "The CEO holds board meetings",
      "Data-center employees ensure operations are running properly and maintain equipment inventory",
      "Customer invoices are printed",
      "Vendor contracts are negotiated"],
    explain: "The operations center houses monitoring and the equipment inventory." },
  { ch: 14, lo: "14.3", section: "Physical Security Entry", type: "memorization",
    q: "Physical security at the data center ensures that:",
    options: [
      "Anyone with an ID may enter",
      "Only employees directly involved with operating the data center are authorized to enter",
      "Customers and vendors may enter freely",
      "Only cleaning staff may enter"],
    explain: "Entry is limited to employees directly involved in operating the data center." },
  { ch: 14, lo: "14.3", section: "Outside Environment", type: "memorization",
    q: "Ideal outside-environment choices for a data center include:",
    options: [
      "Top-floor penthouse with large windows",
      "Lower floors of a physical building on higher ground to avoid flooding",
      "A rooftop without climate control",
      "A remote seaside bunker with no redundancy"],
    explain: "Lower floors + high ground mitigate flooding and structural risks." },
  { ch: 14, lo: "14.3", section: "Physical Security Risk", type: "memorization",
    q: "Which of the following is a typical physical security risk to a data center?",
    options: [
      "Forgotten user password",
      "An unauthorized individual gaining physical access to equipment",
      "A dormant logical-access account",
      "A misconfigured role in RBAC"],
    explain: "Physical access by unauthorized persons is the core physical-security risk." },
  { ch: 14, lo: "14.3", section: "Physical Security Outcomes", type: "memorization",
    q: "A natural disaster destroying data-center equipment can cause ALL of the following EXCEPT:",
    options: ["Disruption of business activities", "Financial loss", "Employee password resets", "Regulatory fines if compliance requirements are violated"],
    explain: "Disaster-related risks are disruption, financial loss, and regulatory exposure — password resets are unrelated." },
  { ch: 14, lo: "14.3", section: "Physical Security Evidence", type: "application",
    q: "Which evidence MOST directly supports physical access controls at a data center?",
    options: [
      "Badge logs or biometric scan logs of entries to the server room",
      "Corporate ESG report",
      "Company's external marketing brochure",
      "An employee satisfaction survey"],
    explain: "Badge/biometric logs capture entry and support physical-access control testing." },
  { ch: 14, lo: "14.3", section: "Facility Compliance", type: "memorization",
    q: "Failing to maintain data-center facilities in accordance with laws and regulations can result in:",
    options: ["Instant promotion of the CIO", "Fines and reputational losses", "Automatic acquisition by a competitor", "A reduction in required audits"],
    explain: "Non-compliance with regulations can produce fines and reputational harm." },
  { ch: 14, lo: "14.3", section: "Inventory Records", type: "memorization",
    q: "Inventory of data-center equipment, systems, and data is maintained in the:",
    options: ["Payroll system", "Operations center", "Legal department", "External auditor's office"],
    explain: "Inventory is maintained within the operations center inside the data center." },
  { ch: 14, lo: "14.3", section: "Heart of Business", type: "memorization",
    q: "The chapter describes the data center as the:",
    options: ["Heart of the business that keeps operations alive", "Least critical facility in any organization", "Same thing as a retail storefront", "Temporary workspace only used during audits"],
    explain: "The data center is the \"heart of the business,\" providing connectivity and continuity." },
  { ch: 14, lo: "14.4", section: "BCP Definition", type: "memorization",
    q: "Business continuity planning (BCP) is:",
    options: [
      "A one-time, static checklist never updated",
      "A set of procedures to protect employees, stakeholders, and assets during a disruptive event — always evolving",
      "A marketing brochure for DR services",
      "Only the legal department's responsibility"],
    explain: "BCP is an evolving set of procedures that keeps the business running through disruptions." },
  { ch: 14, lo: "14.4", section: "DR Subset", type: "memorization",
    q: "Disaster recovery (DR) is:",
    options: [
      "A standalone function unrelated to BCP",
      "A subset of business continuity planning focused on technology recovery",
      "Only applicable to natural disasters",
      "A separate, higher-level function than BCP"],
    explain: "DR is a subset of BCP concerned with recovering IT systems." },
  { ch: 14, lo: "14.4", section: "Backup Considerations", type: "memorization",
    q: "Companies use the importance of data to decide three key considerations:",
    options: ["Color, size, shape of backups", "Site, strategy, cycle (location, quantity, frequency)", "Budget, marketing, vendor", "Weather, geography, politics"],
    explain: "Backup site (where), strategy (how much), and cycle (how often)." },
  { ch: 14, lo: "14.4", section: "Hot Site Characteristics", type: "memorization",
    q: "A hot backup site is:",
    options: [
      "Nearly empty with no installed equipment",
      "Immediately operational, the most expensive, continuously backing up",
      "Mid-cost with partial equipment",
      "Staffed only by volunteers"],
    explain: "Hot = continuously running replica, fastest recovery, highest cost." },
  { ch: 14, lo: "14.4", section: "Warm Site Characteristics", type: "memorization",
    q: "A warm backup site is BEST described as:",
    options: [
      "Immediately live with real-time replication",
      "Equipped with servers ready for systems, updated typically at end-of-day, cheaper than hot",
      "Empty — just physical space and security controls",
      "A synonym for a cold site"],
    explain: "Warm sites have server hardware and are updated at end-of-day." },
  { ch: 14, lo: "14.4", section: "Cold Site Recovery", type: "memorization",
    q: "Recovery to a cold backup site often takes:",
    options: ["Seconds", "A few hours", "Days or weeks", "Years"],
    explain: "Since equipment/systems/data must all be installed, recovery may take days or weeks." },
  { ch: 14, lo: "14.4", section: "RPO Definition", type: "memorization",
    q: "Recovery Point Objective (RPO) measures:",
    options: [
      "How long a system can be down before it significantly damages the business",
      "How much data can be lost before it significantly damages the business",
      "The maximum number of users at any backup site",
      "The physical distance between primary and backup data centers"],
    explain: "RPO = tolerable data loss. RTO = tolerable downtime." },
  { ch: 14, lo: "14.4", section: "RTO/RPO Application", type: "application",
    q: "An executive says: 'We cannot tolerate the core trading system being down for more than five minutes.' This is a statement of:",
    options: ["RPO", "RTO", "BCP completion percentage", "Hot-site cost"],
    explain: "Downtime tolerance is RTO." },
  { ch: 14, lo: "14.4", section: "Incremental Backup", type: "memorization",
    q: "Incremental backups involve copying:",
    options: [
      "All data every time",
      "Only new or updated data since the last backup (of any type)",
      "Only data created since the most recent full backup",
      "Nothing — they just log file names"],
    explain: "Incremental = changes since the last backup of any kind." },
  { ch: 14, lo: "14.4", section: "Storage Trade-off", type: "memorization",
    q: "Which backup strategy uses the LEAST storage space?",
    options: ["Full", "Differential", "Incremental", "Mirror"],
    explain: "Incremental is the cheapest in storage usage." },
  { ch: 14, lo: "14.4", section: "Grandfather Cycle", type: "memorization",
    q: "In the grandfather-father-son backup scheme, the Grandfather cycle is:",
    options: ["A full backup once a month", "A full backup once a week", "A daily incremental or differential", "A continuous replication"],
    explain: "Grandfather = monthly full backup." },
  { ch: 14, lo: "14.4", section: "Father Cycle", type: "memorization",
    q: "In the grandfather-father-son backup scheme, the Father cycle is:",
    options: ["Monthly full", "Weekly full", "Daily incremental/differential", "Continuous"],
    explain: "Father = weekly full backup." },
  { ch: 14, lo: "14.5", section: "Change Management Purpose", type: "memorization",
    q: "Change management decreases risk by:",
    options: [
      "Freezing all system changes indefinitely",
      "Controlling the identification and implementation of required changes to a system",
      "Outsourcing all code to third parties",
      "Eliminating testing prior to deployment"],
    explain: "Change management is a standardized process controlling how changes are identified and implemented." },
  { ch: 14, lo: "14.5", section: "Stages Count", type: "memorization",
    q: "A formal change management process consists of how many stages?",
    options: ["Two", "Three", "Four", "Five"],
    explain: "Three: test, model, production." },
  { ch: 14, lo: "14.5", section: "Segregation of Environments", type: "memorization",
    q: "The three change-management environments must be:",
    options: ["Open and shared to save costs", "Isolated from one another to enforce segregation of duties", "All housed on a single laptop", "Combined during emergency changes to save time"],
    explain: "Isolation enforces segregation of duties among the three change-management steps." },
  { ch: 14, lo: "14.5", section: "Test Environment", type: "memorization",
    q: "The test environment is often called a:",
    options: ["Sandbox", "Model Home", "Live Studio", "Production Floor"],
    explain: "Sandbox — developers can experiment without touching production." },
  { ch: 14, lo: "14.5", section: "Model Environment", type: "memorization",
    q: "The model environment is used to:",
    options: [
      "Draft marketing copy",
      "Evaluate accuracy of changes in a recent copy of the live system before production",
      "Host end-user production traffic",
      "Archive old data permanently"],
    explain: "Model = pre-production validation environment." },
  { ch: 14, lo: "14.5", section: "Production Environment", type: "memorization",
    q: "The production environment is:",
    options: [
      "Where developers write and unit-test code",
      "A recent copy of live used to validate changes",
      "Where the updated system goes live and is available to end users",
      "A marketing term for test environments"],
    explain: "Production = live environment where end users operate." },
  { ch: 14, lo: "14.5", section: "Normal vs Emergency", type: "memorization",
    q: "Emergency changes:",
    options: [
      "Must always pass through the model environment",
      "Require immediate action to mitigate significant risk, such as an outage, compliance, or security issue",
      "Are identical to normal changes",
      "Are permitted only with CEO signature"],
    explain: "Emergency changes skip the model environment due to urgent business risk." },
  { ch: 14, lo: "14.5", section: "Emergency Change Path", type: "application",
    q: "A zero-day security vulnerability is discovered in a live system. The emergency change will:",
    options: [
      "Follow the normal test → model → production sequence",
      "Move directly from test to production, bypassing the model environment",
      "Be deferred until next quarter's release window",
      "Be pushed straight to live without any testing"],
    explain: "Emergency changes bypass the model environment but still involve test steps before production." },
  { ch: 14, lo: "14.5", section: "Change Risks", type: "memorization",
    q: "Unauthorized or incorrect changes to a system can result in:",
    options: ["Data breaches and internal fraud", "A guaranteed increase in productivity", "Automatic approval by regulators", "Restoration of prior systems"],
    explain: "Risks include disruption, incompatibility, breaches, and internal fraud." },
  { ch: 14, lo: "14.5", section: "Test vs Model", type: "application",
    q: "A developer is writing code for a new inventory report. She is BEST working in the:",
    options: ["Test environment (sandbox)", "Model environment", "Production environment", "Backup site"],
    explain: "Creating and initial testing happens in the test environment." },
  { ch: 14, lo: "14.5", section: "Model vs Production", type: "application",
    q: "End users perform acceptance testing of changes before go-live. They work in the:",
    options: ["Test environment", "Model environment", "Production environment", "Vendor sandbox"],
    explain: "User acceptance testing happens in the near-production model environment." },
  { ch: 14, lo: "14.5", section: "Environment Control", type: "application",
    q: "Which risk is MOST reduced by separating the three change-management environments?",
    options: [
      "Risk of employees experimenting without controls in the production environment",
      "Risk of a natural disaster destroying backups",
      "Risk of the grandfather-father-son cycle failing",
      "Risk of auditors asking for documentation"],
    explain: "Isolation prevents uncontrolled production experimentation, supporting segregation of duties." },
  { ch: 19, lo: "19.1", section: "Auditing Definition", type: "memorization",
    q: "Auditing is defined as:",
    options: [
      "A negotiation between management and shareholders over profits",
      "The systematic and independent review of data, records, and operations to provide assurance of control effectiveness and process efficiency",
      "Strategic consulting to increase revenue",
      "The documentation of daily bookkeeping tasks"],
    explain: "Auditing = systematic, independent review providing assurance on controls and process efficiency." },
  { ch: 19, lo: "19.1", section: "Audit Focus", type: "memorization",
    q: "Which is NOT an example of an audit focus identified in the chapter?",
    options: [
      "Assessing the internal control environment",
      "Providing an opinion on the fair presentation of the financial statements",
      "Issuing new stock to raise capital",
      "Identifying gaps in internal controls and business processes"],
    explain: "Issuing stock is a finance function, not an audit focus." },
  { ch: 19, lo: "19.1", section: "Audit Specializations", type: "memorization",
    q: "Historically, auditors were grouped into three specializations:",
    options: ["Tax, legal, and marketing", "Operational/business, financial, and IT", "Manufacturing, retail, and service", "Public, private, and nonprofit"],
    explain: "Historical audit specialties: operational/business, financial, and IT." },
  { ch: 19, lo: "19.1", section: "Unified Audit", type: "memorization",
    q: "The 'unified audit approach' means:",
    options: [
      "Every audit is performed by a single auditor",
      "Employees from different audit specialties work together on an audit",
      "All audits are outsourced to a single vendor",
      "Only one framework may be applied per audit"],
    explain: "Unified = cross-specialty teamwork within an audit." },
  { ch: 19, lo: "19.1", section: "Aligned Assurance", type: "memorization",
    q: "Aligned assurance focuses on ensuring that:",
    options: [
      "The CEO personally reviews every audit report",
      "The second and third lines of defense work cohesively to cover a company's risks",
      "External auditors and regulators issue identical reports",
      "The board of directors performs all testing"],
    explain: "Aligned assurance aligns second-line (risk/compliance) and third-line (internal audit) activities." },
  { ch: 19, lo: "19.1", section: "IIA Three Lines Model", type: "memorization",
    q: "The chapter references the IIA's three lines of defense model, which was updated in:",
    options: ["2010", "2015", "2020", "2022"],
    explain: "IIA updated its three lines of defense model in 2020." },
  { ch: 19, lo: "19.1", section: "External Auditor Objective", type: "memorization",
    q: "External auditors evaluate whether:",
    options: [
      "Employees are performing up to their potential",
      "The financial statements of the client are free from material misstatement and presented in accordance with standards such as GAAP",
      "The client should switch accounting software",
      "The client should merge with a competitor"],
    explain: "External auditors issue opinions on whether statements are fairly presented." },
  { ch: 19, lo: "19.1", section: "Independent Auditor's Report", type: "memorization",
    q: "The independent auditor's report from an external audit must be filed:",
    options: ["Only internally within the client", "According to applicable regulatory requirements", "Only when management requests it", "Only if the audit found no errors"],
    explain: "Filing follows regulatory requirements (e.g., SEC for public companies)." },
  { ch: 19, lo: "19.1", section: "Audit Opinion Section", type: "memorization",
    q: "The auditors' conclusions are presented in which section of the audit report?",
    options: ["The management letter", "The audit opinion section", "The executive summary", "The company's marketing brochure"],
    explain: "The audit opinion section contains the auditor's conclusions." },
  { ch: 19, lo: "19.1", section: "Big Four", type: "memorization",
    q: "The Big Four accounting firms are:",
    options: ["PwC, Deloitte, EY, KPMG", "PwC, Deloitte, EY, BDO", "Grant Thornton, BDO, RSM, CLA", "PwC, Deloitte, Crowe, BDO"],
    explain: "PwC, Deloitte, EY, and KPMG." },
  { ch: 19, lo: "19.1", section: "Big Four Services", type: "memorization",
    q: "Public accounting firms, including the Big Four, ALSO offer:",
    options: ["Only external audits", "Tax and advisory services in addition to external audit", "Only consulting services and no audits", "Cryptocurrency mining services"],
    explain: "Public accounting firms combine audit, tax, and advisory." },
  { ch: 19, lo: "19.1", section: "Internal vs External", type: "application",
    q: "An internal auditor is performing operational testing to help management improve a business process. This is MOST different from an external auditor because:",
    options: [
      "Internal auditors work for the company and may focus on operational improvement; external auditors focus on opinion on financial statements",
      "External auditors are employees of the client company",
      "Internal auditors issue the public audit opinion",
      "External auditors cannot evaluate internal controls"],
    explain: "Internal audit addresses a broader internal scope; external audit focuses on financial statement fair presentation." },
  { ch: 19, lo: "19.2", section: "Audit Plan", type: "memorization",
    q: "An audit plan is:",
    options: [
      "A detailed marketing roadmap for the audit department",
      "A complete list of all audit engagements the team will perform in the upcoming period",
      "A request for proposal to hire external auditors",
      "A financial projection for the coming year"],
    explain: "Audit plan = complete list of upcoming engagements." },
  { ch: 19, lo: "19.2", section: "Audit Risk Assessment", type: "memorization",
    q: "An audit risk assessment uses data and professional judgment to:",
    options: [
      "Identify risky areas in the company's operations for audit prioritization",
      "Replace the annual budget",
      "Determine executive bonuses",
      "Select new office furniture"],
    explain: "The risk assessment prioritizes areas for audit based on risk." },
  { ch: 19, lo: "19.2", section: "Agile Auditing", type: "memorization",
    q: "Agile auditing typically involves:",
    options: ["A rigid 12-month locked plan with no changes", "Working in shorter sprints and making changes as needed", "Outsourcing all testing to external auditors", "Skipping the fieldwork stage entirely"],
    explain: "Agile auditing works in sprints with flexibility to adjust." },
  { ch: 19, lo: "19.2", section: "Rolling Audit Plan", type: "memorization",
    q: "A rolling audit plan:",
    options: [
      "Is the same as a 12-month fixed plan",
      "Is a prioritized list of audit engagements that can be adjusted",
      "Contains only external audits",
      "Is published publicly on the company website"],
    explain: "Rolling plans are prioritized and adaptive over time." },
  { ch: 19, lo: "19.2", section: "Five Stages Order", type: "memorization",
    q: "The correct sequence of the five stages of an audit is:",
    options: ["Fieldwork, Planning, Wrap-up, Reporting, Follow-up", "Planning, Fieldwork, Wrap-up, Reporting, Follow-up", "Planning, Wrap-up, Fieldwork, Reporting, Follow-up", "Planning, Fieldwork, Reporting, Wrap-up, Follow-up"],
    explain: "Order: Planning → Fieldwork → Wrap-up → Reporting → Follow-up." },
  { ch: 19, lo: "19.2", section: "Audit Deliverable", type: "memorization",
    q: "An audit deliverable is:",
    options: [
      "A personal gift from the auditor to the auditee",
      "A formal communication of results or plans from internal audit",
      "A monetary amount paid by management to audit",
      "The name of a type of internal control"],
    explain: "Audit deliverable = formal communication of plans or results." },
  { ch: 19, lo: "19.2", section: "Planning Stage Deliverables", type: "memorization",
    q: "The planning stage produces two key deliverables:",
    options: ["Audit opinion and management letter", "Scoping document and audit canvas", "Workpapers and findings", "Exit meeting minutes and follow-up plan"],
    explain: "Planning deliverables: scoping document and audit canvas." },
  { ch: 19, lo: "19.2", section: "Scoping Document", type: "memorization",
    q: "A scoping document identifies:",
    options: [
      "Employee compensation levels",
      "All identified risks, relevant controls to be tested, and the likelihood and impact of risks",
      "The CEO's daily calendar",
      "The company's tax strategy"],
    explain: "Scoping document lists risks, controls, and risk likelihood/impact." },
  { ch: 19, lo: "19.2", section: "Planning Memo", type: "memorization",
    q: "An audit planning memo includes:",
    options: [
      "Only the audit team's lunch orders",
      "The reason for the audit, audit team members, timelines, and scope details",
      "A legal opinion on the company",
      "Financial statements of the auditee"],
    explain: "Planning memo captures reason, team, timeline, scope." },
  { ch: 19, lo: "19.2", section: "Audit Canvas", type: "memorization",
    q: "An audit canvas is:",
    options: ["A painting hung in the audit department lobby", "An Agile version of the audit planning memo", "A type of audit report template", "A kind of walkthrough documentation"],
    explain: "Audit canvas = Agile version of the planning memo." },
  { ch: 19, lo: "19.2", section: "Kickoff Meeting", type: "memorization",
    q: "The audit kickoff meeting is where:",
    options: [
      "The final report is signed",
      "The audit team presents its plans to the auditee and collects immediate feedback",
      "Findings are publicly announced",
      "Follow-up occurs six months later"],
    explain: "Kickoff = presenting plans and gathering feedback from the auditee." },
  { ch: 19, lo: "19.2", section: "Fraud Risk Assessment", type: "memorization",
    q: "After determining the data scope, the audit team performs risk assessments including:",
    options: ["Weather risk assessments", "Assessments of fraud risks", "Assessments of marketing risks only", "Cryptocurrency exchange risks"],
    explain: "Fraud risk is part of the planning-stage risk assessment." },
  { ch: 19, lo: "19.2", section: "Audit Engagement", type: "memorization",

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(pool, exceptIndex) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return 0;
  let i = Math.floor(Math.random() * pool.length);
  while (i === exceptIndex) i = Math.floor(Math.random() * pool.length);
  return i;
}

function formatTime(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  return h > 0 ? h + ":" + pad(m) + ":" + pad(sec) : pad(m) + ":" + pad(sec);
}

    return { streak: 0, bestStreak: 0 };

    catch(e) { return {}; }

                Chapters 7 · 14 · 19
              </p>
            </div>
            <div className="flex items-center gap-5 font-mono text-xs">
              <div>
                <div className="text-stone-400 uppercase tracking-wider">Score</div>
                <div className="text-2xl font-bold text-stone-900">{stats.correct}<span className="text-stone-400">/{stats.total}</span></div>
              </div>
              <div>
                <div className="text-stone-400 uppercase tracking-wider">Acc</div>
                <div className="text-2xl font-bold text-stone-900">{accuracy}<span className="text-stone-400 text-base">%</span></div>
              </div>
              <div>
                <div className="text-stone-400 uppercase tracking-wider">Streak</div>
                <div className="text-2xl font-bold" style={{ color: stats.streak >= 3 ? "#d97706" : "#1c1917" }}>
                  {stats.streak}{stats.bestStreak > 0 && <span className="text-stone-400 text-sm font-normal"> / {stats.bestStreak}</span>}
                </div>
              </div>
              <div>
                <div className="text-stone-400 uppercase tracking-wider">Time</div>
                <div className="flex items-center gap-2">
                  <div className="text-2xl font-bold text-stone-900 tabular-nums">{formatTime(totalElapsed)}</div>
                  <button
                    type="button"
                    onClick={() => { if (!cycleComplete) setTotalRunning(r => !r); }}
                    aria-label={totalRunning ? "Pause total timer" : "Start total timer"}
                    title={totalRunning ? "Pause total timer" : "Start total timer"}
                    disabled={cycleComplete}
                    style={{
                      width: 22, height: 22, padding: 0, border: "1px solid #d6d3d1",
                      borderRadius: 999, background: "#fff",
                      cursor: cycleComplete ? "default" : "pointer",
                      opacity: cycleComplete ? 0.5 : 1,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      color: "#1c1917",
                    }}
                  >
                    {totalRunning && !cycleComplete ? (
                      <svg width="10" height="10" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="2" height="6" /><rect x="5" y="1" width="2" height="6" /></svg>
                    ) : (
                      <svg width="10" height="10" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><path d="M1 1 L7 4 L1 7 Z" /></svg>
                    )}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </header>

        {/* Chapter filter bar */}
        <div className="flex flex-wrap items-center gap-2 mb-3">
          <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mr-2">Chapter:</span>
          <button
            onClick={() => selectChapter("all")}
            className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
            style={{
              background: selectedChapter === "all" ? "#1c1917" : "transparent",
              color: selectedChapter === "all" ? "#fff" : "#78716c",
              borderColor: selectedChapter === "all" ? "#1c1917" : "#d6d3d1",
            }}
          >
            All chapters
          </button>
          {[7, 14, 19].map(ch => {
            const active = selectedChapter === ch;
            const meta = CHAPTER_META[ch];
            const chStats = stats.byChapter[ch];
            return (
              <button
                key={ch}
                onClick={() => selectChapter(ch)}
                className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                style={{
                  background: active ? meta.accent : "transparent",
                  color: active ? "#fff" : "#78716c",
                  borderColor: active ? meta.accent : "#d6d3d1",
                }}
              >
                Ch {ch} · {meta.title}
                {chStats && (
                  <span className="ml-2 font-mono opacity-80">
                    {chStats.correct}/{chStats.total}
                  </span>
                )}
              </button>
            );
          })}
          <button
            onClick={resetStats}
            className="option-btn ml-auto px-3 py-1.5 text-xs font-mono uppercase tracking-wider text-stone-500 hover:text-stone-900 border border-stone-300 rounded-full"
          >
            Reset
          </button>
        </div>

        {/* LO sub-topic filter — only visible when a specific chapter is selected */}
        {selectedChapter !== "all" && (
          <div className="flex flex-wrap items-center gap-2 mb-3 fade-in">
            <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mr-2">Topic:</span>
            <button
              onClick={() => setSelectedLO("all")}
              className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
              style={{
                background: selectedLO === "all" ? CHAPTER_META[selectedChapter].accent : "transparent",
                color: selectedLO === "all" ? "#fff" : "#78716c",
                borderColor: selectedLO === "all" ? CHAPTER_META[selectedChapter].accent : "#d6d3d1",
              }}
            >
              All topics
            </button>
            {LOS_BY_CHAPTER[selectedChapter].map(lo => {
              const active = selectedLO === lo;
              const count = BANK.filter(q => q.lo === lo).length;
              return (
                <button
                  key={lo}
                  onClick={() => setSelectedLO(lo)}
                  className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                  style={{
                    background: active ? CHAPTER_META[selectedChapter].accent : "transparent",
                    color: active ? "#fff" : "#78716c",
                    borderColor: active ? CHAPTER_META[selectedChapter].accent : "#d6d3d1",
                  }}
                  title={LO_META[lo]}
                >
                  LO {lo} · {LO_META[lo]}
                  <span className="ml-2 font-mono opacity-70">({count})</span>
                </button>
              );
            })}
          </div>
        )}

        {/* Type filter bar */}
        <div className="flex flex-wrap items-center gap-2 mb-6 pb-6 border-b border-stone-300">
          <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mr-2">Type:</span>
          {[
            { key: "all", label: "All" },
            { key: "application", label: "Application" },
            { key: "memorization", label: "Memorization" },
          ].map(({ key, label }) => {
            const active = typeFilter === key;
            const count = BANK.filter(q =>
              (selectedChapter === "all" || q.ch === selectedChapter) &&
              (selectedLO === "all" || q.lo === selectedLO) &&
              (key === "all" || q.type === key)
            ).length;
            return (
              <button
                key={key}
                onClick={() => setTypeFilter(key)}
                className="option-btn px-3 py-1.5 text-xs font-medium rounded-full border"
                style={{
                  background: active ? "#1c1917" : "transparent",
                  color: active ? "#fff" : "#78716c",
                  borderColor: active ? "#1c1917" : "#d6d3d1",
                }}
              >
                {label} <span className="font-mono opacity-70 ml-1">({count})</span>
              </button>
            );
          })}
          <span className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 hidden sm:inline">
            Keys: 1–4 · Enter
          </span>
        </div>

        {/* Progress & status row */}
        <div className="flex flex-wrap items-center gap-3 mb-6">
          <div className="flex-1 min-w-[180px]">
            <div className="flex items-center justify-between font-mono text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1.5">
              <span>Mastered this cycle</span>
              <span className="flex items-center gap-3">
                <span className="flex items-center gap-1.5">
                  <span className="tabular-nums text-stone-700" style={{ fontSize: 11 }}>{formatTime(timerElapsed)}</span>
                  <button
                    type="button"
                    onClick={() => { if (!cycleComplete) setTimerRunning(r => !r); }}
                    aria-label={timerRunning ? "Pause timer" : "Start timer"}
                    title={timerRunning ? "Pause timer" : "Start timer"}
                    disabled={cycleComplete}
                    style={{
                      width: 18, height: 18, padding: 0, border: "1px solid #d6d3d1",
                      borderRadius: 999, background: "#fff",
                      cursor: cycleComplete ? "default" : "pointer",
                      opacity: cycleComplete ? 0.5 : 1,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      color: "#1c1917",
                    }}
                  >
                    {timerRunning ? (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><rect x="1" y="1" width="2" height="6" /><rect x="5" y="1" width="2" height="6" /></svg>
                    ) : (
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><path d="M1 1 L7 4 L1 7 Z" /></svg>
                    )}
                  </button>
                </span>
                <span>
                  {filteredPool.filter(q => answered[q.idx] === "correct").length} / {filteredPool.length}
                </span>
              </span>
            </div>
            <div className="flex gap-[2px] flex-wrap">
              {filteredPool.map(q => {
                const s = answered[q.idx];
                const isCurrent = current && current.q && current.q.idx === q.idx;
                const bg = s === "correct" ? "#16a34a" : s === "wrong" ? "#dc2626" : "#e7e5e4";
                const label = s === "correct" ? "Correct" : s === "wrong" ? "Wrong" : "Unseen";
                return (
                  <button
                    key={q.idx}
                    type="button"
                    onClick={() => jumpToQuestion(q)}
                    title={label + " — click to revisit"}
                    aria-label={"Jump to question: " + label}
                    style={{
                      width: 10, height: 10, borderRadius: 2, background: bg,
                      padding: 0, border: 0, cursor: "pointer",
                      outline: isCurrent ? "2px solid #1c1917" : "none",
                      outlineOffset: isCurrent ? 1 : 0,
                    }}
                  />
                );
              })}
            </div>
          </div>
        </div>

        {cycleComplete && (
          <div className="fade-in mb-6 rounded-2xl p-5 border" style={{ background: "#fff", borderColor: "#d6d3d1" }}>
            <div className="font-serif-display text-xl font-bold text-stone-900 mb-1">All mastered</div>
            <div className="text-sm text-stone-600 mb-3">
              You've answered all {filteredPool.length} questions in this filter correctly. Start a new cycle to go through them again.
            </div>
            <button
              onClick={startNewCycle}
              className="option-btn px-4 py-2 text-sm font-medium rounded-full text-white"
              style={{ background: "#1c1917" }}
            >
              Start new cycle
            </button>
          </div>
        )}


        {/* Question card */}
        {current ? (
          <div key={stats.total} className="fade-in">
            {/* Source metadata */}
            <div className="flex items-center gap-3 mb-4 flex-wrap">
              <span
                className="font-mono text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded"
                style={{
                  background: CHAPTER_META[current.q.ch].accent,
                  color: "#fff",
                }}
              >
                Ch {current.q.ch} · LO {current.q.lo}
              </span>
              <span className="font-mono text-xs text-stone-500">
                § {current.q.section}
              </span>
              <span
                className="ml-auto font-mono text-[10px] uppercase tracking-[0.18em] px-2 py-0.5 rounded border"
                style={{
                  borderColor: current.q.type === "application" ? "#d97706" : "#a8a29e",
                  color: current.q.type === "application" ? "#b45309" : "#78716c",
                  background: current.q.type === "application" ? "#fef3c7" : "transparent",
                }}
              >
                {current.q.type}
              </span>
            </div>

            {/* Question */}
            <div className="relative mb-7">
              <div className="absolute -left-3 top-0 bottom-0 w-0.5" style={{ background: CHAPTER_META[current.q.ch].accent, opacity: 0.3 }}/>
              <h2 className="font-serif-display text-2xl sm:text-[28px] leading-[1.25] text-stone-900 font-semibold pl-3">
                {current.q.q}
              </h2>
            </div>

            {/* Options */}
            <div className="space-y-2.5 mb-6">
              {current.shuffledOptions.map((opt, i) => {
                const isCorrect = i === current.correctShuffledIndex;
                const isSelected = i === selected;
                let bg = "#fff";
                let border = "#e7e5e4";
                let textColor = "#1c1917";
                let letterBg = "#f5f5f4";
                let letterColor = "#78716c";

                if (revealed) {
                  if (isCorrect) {
                    bg = "#f0fdf4";
                    border = "#16a34a";
                    letterBg = "#16a34a";
                    letterColor = "#fff";
                  } else if (isSelected) {
                    bg = "#fef2f2";
                    border = "#dc2626";
                    letterBg = "#dc2626";
                    letterColor = "#fff";
                  } else {
                    textColor = "#a8a29e";
                  }
                } else if (isSelected) {
                  border = "#1c1917";
                }

                return (
                  <button
                    key={i}
                    onClick={() => handleSelect(i)}
                    disabled={revealed}
                    className="option-btn w-full text-left px-4 py-3.5 rounded-lg border flex items-start gap-4 disabled:cursor-default"
                    style={{ background: bg, borderColor: border, color: textColor }}
                  >
                    <span
                      className="font-mono text-xs font-bold w-6 h-6 flex items-center justify-center rounded shrink-0 mt-0.5"
                      style={{ background: letterBg, color: letterColor }}
                    >
                      {String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-[15px] leading-snug flex-1">{opt}</span>
                    {revealed && isCorrect && (
                      <span className="text-green-600 font-bold text-lg">✓</span>
                    )}
                    {revealed && isSelected && !isCorrect && (
                      <span className="text-red-600 font-bold text-lg">✕</span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Explanation + next */}
            {revealed && (
              <div className="fade-in">
                <div className="border-t-2 border-dashed border-stone-300 pt-5 mb-5">
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
                    {selected === current.correctShuffledIndex ? "Correct" : "Answer"}
                  </div>
                  <p className="font-serif-display text-[17px] leading-relaxed text-stone-800 italic">
                    {current.q.explain}
                  </p>
                </div>
                <button
                  onClick={loadNext}
                  className="option-btn w-full sm:w-auto px-8 py-3 rounded-lg font-medium text-sm text-white"
                  style={{ background: "#1c1917" }}
                >
                  Next question →
                </button>
              </div>
            )}
          </div>
        ) : (
          <div className="text-center py-20 text-stone-500 font-serif-display italic">
            No questions in the selected scope.
          </div>
        )}

        {/* Footer */}
        <footer className="mt-16 pt-6 border-t border-stone-200 font-mono text-[10px] uppercase tracking-[0.18em] text-stone-400 flex flex-wrap justify-between gap-2">
          <span>{BANK.length} questions · {filteredPool.length} in scope</span>
          <span>Continuous review mode</span>
        </footer>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AISQuiz />);
  </script>
</body>
</html>
