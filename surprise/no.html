<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Again</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <img src="nah.jpeg" alt="Wrong choice" class="no-photo">
        
        <h1>Try again...</h1>
        <p>That was the wrong answer!</p>
        <a href="index.html" class="btn">Go Back</a>
    </div>
<!-- CURSOR SPARKLE TRAIL -->
<script>
(function() {
    var sparkles = ['*', '+', '.', '*'];
    var colors = ['#ffff00', '#00ffff', '#ff00ff', '#00ff00', '#ff8800', '#ffffff'];
    document.addEventListener('mousemove', function(e) {
        var s = document.createElement('div');
        s.className = 'cursor-sparkle';
        s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
        s.style.left = (e.clientX + (Math.random() * 20 - 10)) + 'px';
        s.style.top = (e.clientY + (Math.random() * 20 - 10)) + 'px';
        s.style.color = colors[Math.floor(Math.random() * colors.length)];
        s.style.fontSize = (10 + Math.random() * 14) + 'px';
        document.body.appendChild(s);
        setTimeout(function() { s.remove(); }, 600);
    });
})();
</script>

</body>
</html>
